<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASENORTE - Portal Inteligente</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --primary:#0d7a6e;
    --secondary:#085a52;
    --accent:#d4a017;
    --bg:#f4f7f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:'Segoe UI',Tahoma,sans-serif;
    padding:15px;
    color:#333;
}

.container{
    max-width:1300px;
    margin:auto;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.1);
}

.header{
    background:linear-gradient(135deg,var(--primary),#16a596);
    color:white;
    text-align:center;
    padding:35px;
}

.header h1{
    font-size:42px;
}

.header p{
    margin-top:10px;
}

.search-box{
    background:#fafafa;
    padding:25px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.search-box input{
    flex:1;
    min-width:250px;
    padding:15px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:16px;
    outline:none;
}

.search-box input:focus{
    border-color:var(--primary);
}

.search-box button{
    background:var(--primary);
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.search-box button:hover{
    background:var(--secondary);
}

.loader{
    display:none;
    padding:25px;
    text-align:center;
    color:var(--primary);
    font-weight:bold;
}

.alert{
    margin:15px 25px;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}

.error{
    background:#f8d7da;
    color:#721c24;
}

.success{
    background:#d4edda;
    color:#155724;
}

.result{
    display:none;
    padding:25px;
}

.profile{
    background:linear-gradient(135deg,var(--primary),#16a596);
    color:white;
    border-radius:15px;
    padding:25px;
    margin-bottom:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile h2{
    margin-bottom:10px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.stat{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 3px 12px rgba(0,0,0,.05);
}

.stat h4{
    color:#666;
    margin-bottom:10px;
}

.stat strong{
    color:var(--primary);
    font-size:24px;
}

.section{
    margin-top:30px;
}

.section h3{
    color:var(--primary);
    margin-bottom:15px;
    border-left:5px solid var(--accent);
    padding-left:10px;
}

.table-wrap{
    overflow:auto;
    border:1px solid #ddd;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#f5f5f5;
    color:var(--primary);
}

table th,
table td{
    padding:12px;
    border-bottom:1px solid #eee;
    font-size:14px;
    text-align:left;
}

.badge{
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.ok{
    background:#d4edda;
    color:#155724;
}

.bad{
    background:#f8d7da;
    color:#721c24;
}

.footer{
    text-align:center;
    padding:20px;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
    <h1>ASENORTE</h1>
    <p>Portal Académico Inteligente</p>
</div>

<div class="search-box">

    <input
        type="text"
        id="docInput"
        placeholder="Ingrese documento del estudiante"
    >

    <button onclick="consultar()">
        <i class="fas fa-search"></i>
        CONSULTAR
    </button>

</div>

<div id="loader" class="loader">
    <i class="fas fa-sync fa-spin"></i>
    Analizando base de datos SQL...
</div>

<div id="alerts"></div>

<div id="result" class="result">

    <div class="profile">

        <div>
            <h2 id="nombre"></h2>
            <p id="documento"></p>
            <p id="correo"></p>
            <p id="codigo"></p>
        </div>

        <i class="fas fa-user-graduate fa-4x"></i>

    </div>

    <div class="stats">

        <div class="stat">
            <h4>Promedio</h4>
            <strong id="promedio">0</strong>
        </div>

        <div class="stat">
            <h4>Total Cursos</h4>
            <strong id="materias">0</strong>
        </div>

        <div class="stat">
            <h4>Total Pagado</h4>
            <strong id="pagado">$0</strong>
        </div>

    </div>

    <div class="section">

        <h3>
            <i class="fas fa-book"></i>
            Historial Académico
        </h3>

        <div class="table-wrap">

            <table>

                <thead>
                <tr>
                    <th>Módulo</th>
                    <th>Nota</th>
                    <th>Fecha</th>
                    <th>Profesor</th>
                    <th>Grupo</th>
                    <th>Estado</th>
                </tr>
                </thead>

                <tbody id="notasBody"></tbody>

            </table>

        </div>

    </div>

    <div class="section">

        <h3>
            <i class="fas fa-money-bill-wave"></i>
            Historial Financiero
        </h3>

        <div class="table-wrap">

            <table>

                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Concepto</th>
                    <th>Valor</th>
                </tr>
                </thead>

                <tbody id="pagosBody"></tbody>

            </table>

        </div>

    </div>

</div>

<div class="footer">
    Sistema generado desde asenorte.sql
</div>

</div>
</div>

<script>

/*
|--------------------------------------------------------------------------
| SQL RAW GITHUB
|--------------------------------------------------------------------------
*/

const SQL_URL =
'https://raw.githubusercontent.com/Jhonbonet/Plataforma/main/asenorte.sql';

/*
|--------------------------------------------------------------------------
| CACHE
|--------------------------------------------------------------------------
*/

let SQL_TEXT = '';
let TABLES = {};

/*
|--------------------------------------------------------------------------
| HELPERS UI
|--------------------------------------------------------------------------
*/

function loader(show=true){

    document.getElementById('loader').style.display =
        show ? 'block' : 'none';
}

function alertMsg(msg,type='error'){

    document.getElementById('alerts').innerHTML =
    `<div class="alert ${type}">${msg}</div>`;
}

/*
|--------------------------------------------------------------------------
| CLEAN SQL
|--------------------------------------------------------------------------
*/

function clean(v){

    if(v === undefined || v === null){
        return '';
    }

    return String(v)
        .replace(/\\'/g,"'")
        .replace(/\\"/g,'"')
        .replace(/\\\\/g,'\\')
        .replace(/\r/g,' ')
        .replace(/\n/g,' ')
        .trim();
}

/*
|--------------------------------------------------------------------------
| LOAD SQL
|--------------------------------------------------------------------------
*/

async function loadSQL(){

    if(SQL_TEXT){
        return;
    }

    const response = await fetch(SQL_URL);

    if(!response.ok){

        throw new Error(
            'No se pudo descargar asenorte.sql'
        );
    }

    SQL_TEXT = await response.text();

    if(
        !SQL_TEXT.includes('INSERT INTO')
    ){

        throw new Error(
            'El archivo no es SQL válido'
        );
    }

    splitTables();
}

/*
|--------------------------------------------------------------------------
| SPLIT TABLES
|--------------------------------------------------------------------------
*/

function splitTables(){

    const regex =
/-- Volcado de datos para la tabla `([^`]+)`([\s\S]*?)(?=(-- Volcado de datos para la tabla|$))/g;

    let match;

    while((match = regex.exec(SQL_TEXT)) !== null){

        TABLES[match[1]] = match[2];
    }

    console.log('TABLAS SQL:',Object.keys(TABLES));
}

/*
|--------------------------------------------------------------------------
| INSERTS
|--------------------------------------------------------------------------
*/

function getInsertBlocks(section){

    if(!section){
        return [];
    }

    const regex =
/INSERT INTO[\s\S]*?VALUES\s*([\s\S]*?);/gi;

    const blocks = [];

    let match;

    while((match = regex.exec(section)) !== null){

        blocks.push(match[1]);
    }

    return blocks;
}

/*
|--------------------------------------------------------------------------
| PARSER SQL MULTILINE
|--------------------------------------------------------------------------
*/

function parseRows(block){

    const rows = [];

    const regex =
/\(([\s\S]*?)\)(?=,?\s*(\(|$))/g;

    let match;

    while((match = regex.exec(block)) !== null){

        rows.push(
            splitFields(match[1])
        );
    }

    return rows;
}

function splitFields(row){

    const result = [];

    let current = '';
    let inside = false;

    for(let i=0;i<row.length;i++){

        const c = row[i];
        const prev = row[i-1];

        if(c === "'" && prev !== "\\"){
            inside = !inside;
        }

        if(c === ',' && !inside){

            result.push(cleanField(current));

            current='';

        }else{
            current += c;
        }
    }

    result.push(cleanField(current));

    return result;
}

function cleanField(v){

    return clean(
        v
        .trim()
        .replace(/^'/,'')
        .replace(/'$/,'')
    );
}

/*
|--------------------------------------------------------------------------
| BUSCAR ESTUDIANTE
|--------------------------------------------------------------------------
|
| IMPORTANTE:
| El documento NO es la llave real.
|
| Debemos encontrar:
|
| documento -> id interno
|
|--------------------------------------------------------------------------
*/

function findStudent(documento){

    /*
    TABLAS POSIBLES
    */

    const posibles = [

        'tbl_usuarios',
        'tbl_estudiantes',
        'admisiones',
        'matriculas'

    ];

    for(const tabla of posibles){

        const sec = TABLES[tabla];

        if(!sec){
            continue;
        }

        const inserts =
            getInsertBlocks(sec);

        for(const block of inserts){

            const rows =
                parseRows(block);

            for(const r of rows){

                /*
                Buscar documento en cualquier campo
                */

                const found =
                    r.find(v =>
                        String(v).trim() ===
                        String(documento).trim()
                    );

                if(found){

                    /*
                    ID interno
                    */

                    const id = r[0];

                    return {

                        id:id,

                        nombre:
                            (
                                (r[3] || '') +
                                ' ' +
                                (r[4] || '')
                            ).trim(),

                        documento:documento,

                        correo:
                            r.find(v =>
                                String(v).includes('@')
                            ) || ''
                    };
                }
            }
        }
    }

    /*
    BÚSQUEDA GLOBAL
    */

    for(const tabla in TABLES){

        const inserts =
            getInsertBlocks(TABLES[tabla]);

        for(const block of inserts){

            const rows =
                parseRows(block);

            for(const r of rows){

                const found =
                    r.find(v =>
                        String(v).trim() ===
                        String(documento).trim()
                    );

                if(found){

                    return {

                        id:r[0],

                        nombre:
                            (
                                (r[3] || '') +
                                ' ' +
                                (r[4] || '')
                            ).trim(),

                        documento,

                        correo:
                            r.find(v =>
                                String(v).includes('@')
                            ) || ''
                    };
                }
            }
        }
    }

    return null;
}

/*
|--------------------------------------------------------------------------
| IDs RELACIONADOS
|--------------------------------------------------------------------------
|
| El estudiante puede cambiar:
|
| ESTUDIANTE_NOTA
| ESTUDIANTE_MATRICULA
| ID_ESTUDIANTE
| CLIENTE_CREDITO
| CLIENTE_RECIBO
|
|--------------------------------------------------------------------------
*/

function relatedIds(student){

    const ids = new Set();

    ids.add(String(student.id));
    ids.add(String(student.documento));

    /*
    Buscar referencias cruzadas
    */

    for(const tabla in TABLES){

        const inserts =
            getInsertBlocks(TABLES[tabla]);

        for(const block of inserts){

            const rows =
                parseRows(block);

            for(const r of rows){

                const found =
                    r.find(v =>
                        String(v).trim() ===
                        String(student.documento).trim()
                    );

                if(found){

                    ids.add(String(r[0]));

                    r.forEach(v=>{

                        if(
                            /^\d+$/.test(v)
                        ){
                            ids.add(String(v));
                        }
                    });
                }
            }
        }
    }

    console.log('IDS RELACIONADOS:',ids);

    return [...ids];
}

/*
|--------------------------------------------------------------------------
| NOTAS
|--------------------------------------------------------------------------
*/

function findGrades(ids){

    const data = [];

    const posibles = [

        'tbl_resultados',
        'tbl_notas',
        'notas',
        'calificaciones'

    ];

    for(const tabla of posibles){

        const sec = TABLES[tabla];

        if(!sec){
            continue;
        }

        const inserts =
            getInsertBlocks(sec);

        for(const block of inserts){

            const rows =
                parseRows(block);

            for(const r of rows){

                const found =
                    r.find(v =>
                        ids.includes(
                            String(v)
                        )
                    );

                if(found){

                    const nota =
                        parseFloat(
                            r.find(v =>
                                /^[0-5](\.\d+)?$/.test(v)
                            )
                        ) || 0;

                    data.push({

                        modulo:
                            r[2] ||
                            r[1] ||
                            'Módulo',

                        nota,

                        fecha:
                            r.find(v =>
                                /\d{4}-\d{2}-\d{2}/
                                .test(v)
                            ) || '---',

                        profesor:
                            r[5] || '---',

                        grupo:
                            r[6] || '---'
                    });
                }
            }
        }
    }

    return data;
}

/*
|--------------------------------------------------------------------------
| PAGOS
|--------------------------------------------------------------------------
*/

function findPayments(ids){

    const data = [];

    const posibles = [

        'fac_creditos',
        'fac_recibos',
        'pagos',
        'creditos'

    ];

    for(const tabla of posibles){

        const sec = TABLES[tabla];

        if(!sec){
            continue;
        }

        const inserts =
            getInsertBlocks(sec);

        for(const block of inserts){

            const rows =
                parseRows(block);

            for(const r of rows){

                const found =
                    r.find(v =>
                        ids.includes(
                            String(v)
                        )
                    );

                if(found){

                    const valor =
                        parseFloat(
                            r.find(v =>
                                /^\d{4,}$/.test(v)
                            )
                        ) || 0;

                    data.push({

                        fecha:
                            r.find(v =>
                                /\d{4}-\d{2}-\d{2}/
                                .test(v)
                            ) || '---',

                        concepto:
                            r[6] ||
                            r[5] ||
                            'Pago',

                        valor
                    });
                }
            }
        }
    }

    return data;
}

/*
|--------------------------------------------------------------------------
| MONEY
|--------------------------------------------------------------------------
*/

function money(v){

    return Number(v).toLocaleString(
        'es-CO',
        {
            style:'currency',
            currency:'COP',
            minimumFractionDigits:0
        }
    );
}

/*
|--------------------------------------------------------------------------
| RENDER USER
|--------------------------------------------------------------------------
*/

function renderUser(u){

    document.getElementById('nombre')
        .innerText =
        u.nombre || 'ESTUDIANTE';

    document.getElementById('documento')
        .innerText =
        'Documento: ' + u.documento;

    document.getElementById('correo')
        .innerText =
        'Correo: ' + (u.correo || '---');

    document.getElementById('codigo')
        .innerText =
        'ID Relacional: ' + u.id;
}

/*
|--------------------------------------------------------------------------
| RENDER NOTAS
|--------------------------------------------------------------------------
*/

function renderGrades(grades){

    const body =
        document.getElementById('notasBody');

    body.innerHTML='';

    let total = 0;

    if(!grades.length){

        body.innerHTML = `
        <tr>
            <td colspan="6">
                No existen notas registradas
            </td>
        </tr>
        `;

        return;
    }

    grades.forEach(g=>{

        total += Number(g.nota);

        body.innerHTML += `
        <tr>

            <td>${g.modulo}</td>

            <td>${g.nota}</td>

            <td>${g.fecha}</td>

            <td>${g.profesor}</td>

            <td>${g.grupo}</td>

            <td>
                ${
                    g.nota >= 3
                    ? '<span class="badge ok">APROBADO</span>'
                    : '<span class="badge bad">REPROBADO</span>'
                }
            </td>

        </tr>
        `;
    });

    document.getElementById('promedio')
        .innerText =
        (total / grades.length).toFixed(2);

    document.getElementById('materias')
        .innerText =
        grades.length;
}

/*
|--------------------------------------------------------------------------
| RENDER PAGOS
|--------------------------------------------------------------------------
*/

function renderPayments(payments){

    const body =
        document.getElementById('pagosBody');

    body.innerHTML='';

    let total = 0;

    if(!payments.length){

        body.innerHTML = `
        <tr>
            <td colspan="3">
                No existen pagos registrados
            </td>
        </tr>
        `;

        return;
    }

    payments.forEach(p=>{

        total += Number(p.valor);

        body.innerHTML += `
        <tr>

            <td>${p.fecha}</td>

            <td>${p.concepto}</td>

            <td>${money(p.valor)}</td>

        </tr>
        `;
    });

    document.getElementById('pagado')
        .innerText =
        money(total);
}

/*
|--------------------------------------------------------------------------
| CONSULTAR
|--------------------------------------------------------------------------
*/

async function consultar(){

    const documento =
        document.getElementById('docInput')
        .value
        .trim();

    if(!documento){

        alertMsg(
            'Ingrese documento'
        );

        return;
    }

    try{

        loader(true);

        document.getElementById('result')
            .style.display='none';

        /*
        CARGAR SQL
        */

        await loadSQL();

        /*
        ESTUDIANTE
        */

        const student =
            findStudent(documento);

        if(!student){

            alertMsg(
                'Estudiante no encontrado'
            );

            loader(false);

            return;
        }

        /*
        IDs RELACIONADOS
        */

        const ids =
            relatedIds(student);

        /*
        NOTAS
        */

        const grades =
            findGrades(ids);

        /*
        PAGOS
        */

        const payments =
            findPayments(ids);

        /*
        RENDER
        */

        renderUser(student);

        renderGrades(grades);

        renderPayments(payments);

        document.getElementById('result')
            .style.display='block';

        alertMsg(
            'Consulta realizada correctamente',
            'success'
        );

    }catch(err){

        console.error(err);

        alertMsg(
            err.message ||
            'Error procesando SQL'
        );
    }

    loader(false);
}

/*
|--------------------------------------------------------------------------
| ENTER
|--------------------------------------------------------------------------
*/

document
.getElementById('docInput')
.addEventListener('keypress',e=>{

    if(e.key === 'Enter'){
        consultar();
    }
});

</script>

</body>
</html>
