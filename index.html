<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d7a6e; --accent: #d4a017; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 30px; padding-bottom: 20px; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #f1f1f1; padding: 20px; border-radius: 10px; }
        input { width: 300px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .card { display: none; animation: fadeIn 0.5s ease; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: var(--primary); color: white; }
        .loader { display: none; text-align: center; margin: 20px; color: var(--primary); font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ASENORTE</h1>
        <p>Portal de Consulta Académica</p>
    </div>

    <div class="search-box">
        <input type="text" id="studentDoc" placeholder="Número de Documento">
        <button onclick="consultar()"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Procesando base de datos...</div>

    <div id="resultCard" class="card">
        <div style="background: var(--primary); color: white; padding: 15px; border-radius: 8px;">
            <h2 id="studentName" style="margin:0;"></h2>
            <p id="studentProg" style="margin:5px 0 0 0;"></p>
        </div>
        
        <h3><i class="fas fa-graduation-cap"></i> Notas y Resultados</h3>
        <div id="tablaNotas"></div>

        <h3><i class="fas fa-money-bill-wave"></i> Registro de Pagos / Créditos</h3>
        <div id="tablaPagos"></div>
    </div>
</div>

<script>
    // URL de descarga de tu archivo SQL en Drive
    const SQL_URL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

    async function consultar() {
        const doc = document.getElementById('studentDoc').value.trim();
        if (!doc) return alert("Ingrese un documento");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';

        try {
            const response = await fetch(SQL_URL);
            const sqlText = await response.text();

            // 1. Buscar en tbl_usuarios (Estructura real detectada)
            const usuario = buscarDatos(sqlText, 'tbl_usuarios', doc);
            if (!usuario) {
                alert("No se encontró el estudiante.");
                return;
            }

            // Mapeo según tu SQL: [3] nombre, [4] apellido, [0] ID interno
            document.getElementById('studentName').innerText = usuario[3] + " " + usuario[4];
            document.getElementById('studentProg').innerText = "Identificación: " + usuario[6];

            // 2. Buscar Notas en tbl_resultados (vinculado por el ID del usuario)
            const idInterno = usuario[0];
            const notasRaw = buscarLineasMultiples(sqlText, 'tbl_resultados', idInterno);
            const notas = notasRaw.map(n => {
                const v = extraerValores(n);
                return { modulo: 'Unidad ' + v[1], nota: v[3], fecha: v[4] };
            });
            renderTable('tablaNotas', notas, ["Referencia", "Nota", "Fecha"], ["modulo", "nota", "fecha"]);

            // 3. Buscar Pagos en fac_creditos (vinculado por documento)
            const pagosRaw = buscarLineasMultiples(sqlText, 'fac_creditos', doc);
            const pagos = pagosRaw.map(p => {
                const v = extraerValores(p);
                return { concepto: v[6], valor: v[5], fecha: v[1] };
            });
            renderTable('tablaPagos', pagos, ["Concepto", "Monto", "Fecha"], ["concepto", "valor", "fecha"]);

            document.getElementById('resultCard').style.display = 'block';

        } catch (e) {
            console.error(e);
            alert("Error al acceder a la base de datos.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function buscarDatos(texto, tabla, criterio) {
        const regex = new RegExp(`INSERT INTO \`${tabla}\` VALUES\\([^;]*'${criterio}'[^;]*\\);`, 'i');
        const match = texto.match(regex);
        return match ? extraerValores(match[0]) : null;
    }

    function buscarLineasMultiples(texto, tabla, criterio) {
        const regex = new RegExp(`INSERT INTO \`${tabla}\` VALUES\\([^;]*'${criterio}'[^;]*\\);`, 'gi');
        return texto.match(regex) || [];
    }

    function extraerValores(linea) {
        const contenido = linea.match(/\((.*)\)/)[1];
        return contenido.split(/,\s*/).map(v => v.replace(/'/g, "").trim());
    }

    function renderTable(id, datos, encabezados, campos) {
        let html = '<table><tr>' + encabezados.map(h => `<th>${h}</th>`).join('') + '</tr>';
        if (datos.length > 0) {
            datos.forEach(d => {
                html += '<tr>' + campos.map(c => `<td>${d[c]}</td>`).join('') + '</tr>';
            });
        } else {
            html += `<tr><td colspan="${encabezados.length}">No hay registros</td></tr>`;
        }
        document.getElementById(id).innerHTML = html + '</table>';
    }
</script>
</body>
</html>
