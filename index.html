<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login ASENORTE</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .loading { color: blue; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Login ASENORTE</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>Tipo de Documento:</label>
            <select id="tipoDocumento" required>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="CE">Cédula de Extranjería</option>
                <option value="NIT">NIT</option>
            </select>
        </div>
        <div class="form-group">
            <label>Número de Documento:</label>
            <input type="number" id="documento" required placeholder="Ej: 123456789">
        </div>
        <div class="form-group">
            <label>Programa:</label>
            <select id="programa" required>
                <option value="SST">Salud y Seguridad en el Trabajo</option>
                <option value="AE">Auxiliar en Enfermería</option>
                <option value="SE">Secretariado Ejecutivo</option>
                <option value="MD">Mantenimiento de Dispositivos</option>
            </select>
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <div id="mensaje"></div>

    <script src="autenticacion.js"></script>
    <script>
        // Configurar la URL del archivo SQL en Google Drive
        // Reemplaza TU_ID_DEL_ARCHIVO con el ID real de tu archivo
        window.ARCHIVO_SQL_URL = 'https://drive.google.com/uc?export=download&id=TU_ID_DEL_ARCHIVO';
        
        const form = document.getElementById('loginForm');
        const mensajeDiv = document.getElementById('mensaje');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const documento = document.getElementById('documento').value;
            const tipoDocumento = document.getElementById('tipoDocumento').value;
            const programa = document.getElementById('programa').value;
            
            // Mostrar loading
            mensajeDiv.innerHTML = '<div class="loading">🔍 Buscando información...</div>';
            
            try {
                const resultado = await autenticarEstudiante(documento, tipoDocumento, programa);
                
                if (resultado.success) {
                    mensajeDiv.innerHTML = `
                        <div class="success">
                            ✅ ${resultado.message}<br>
                            📄 Documento: ${resultado.estudiante.documento}<br>
                            📚 Programa: ${resultado.estudiante.programa}<br>
                            📊 Facturas: ${resultado.estudiante.totalFacturas}<br>
                            💳 Créditos: ${resultado.estudiante.totalCreditos}<br>
                            💰 Recibos: ${resultado.estudiante.totalRecibos}<br>
                            💵 Saldo pendiente: $${resultado.estudiante.saldoPendiente?.toLocaleString() || 0}
                        </div>
                    `;
                    
                    // Guardar sesión
                    localStorage.setItem('usuario', JSON.stringify(resultado.estudiante));
                    
                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                }
            } catch (error) {
                mensajeDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
