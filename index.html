<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d7a6e; --accent: #d4a017; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 30px; padding-bottom: 20px; }
        .search-section { background: #eee; padding: 25px; border-radius: 12px; display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        input { width: 60%; padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #085a52; }
        .result-card { display: none; animation: fadeIn 0.5s ease-in-out; }
        .profile-header { background: var(--primary); color: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border: 1px solid #e0e0e0; text-align: left; }
        th { background: #f1f1f1; color: var(--primary); font-weight: bold; }
        .loader { display: none; text-align: center; font-weight: bold; color: var(--primary); margin: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color: var(--primary); margin: 0;">ASENORTE</h1>
        <p style="color: #666;">Sistema de Consulta Estudiantil v3.0</p>
    </div>

    <div class="search-section">
        <input type="text" id="docInput" placeholder="Ingrese su número de cédula...">
        <button onclick="consultarServidor()"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loading" class="loader">
        <i class="fas fa-database fa-spin"></i> Analizando base de datos en la nube...
    </div>

    <div id="resultCard" class="result-card">
        <div class="profile-header">
            <h2 id="viewNombre" style="margin:0;"></h2>
            <p id="viewDoc" style="margin:5px 0 0 0; opacity: 0.9;"></p>
        </div>

        <h3><i class="fas fa-book"></i> Calificaciones y Módulos</h3>
        <div id="areaNotas"></div>

        <h3><i class="fas fa-file-invoice-dollar"></i> Estado de Cuenta (Pagos)</h3>
        <div id="areaPagos"></div>
    </div>
</div>

<script>
    // URL DE TU ARCHIVO SQL EN DRIVE
    const DRIVE_SQL_URL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

    async function consultarServidor() {
        const cedula = document.getElementById('docInput').value.trim();
        if (!cedula) return alert("Por favor ingrese su número de documento.");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';

        try {
            // Descargar el volcado SQL
            const response = await fetch(DRIVE_SQL_URL);
            if (!response.ok) throw new Error("No se pudo conectar con Google Drive.");
            const sqlText = await response.text();

            // 1. BUSCAR USUARIO (En tbl_usuarios)
            // Estructura: (ID, 'login', 'pass', 'Nombre', 'Apellido', 'Correo', 'Cédula', ...)
            const userLine = findLine(sqlText, 'tbl_usuarios', cedula);
            if (!userLine) {
                alert("Estudiante no encontrado en la base de datos de ASENORTE.");
                return;
            }
            const u = parseSQLValues(userLine);
            const internalID = u[0]; // ID para buscar notas

            document.getElementById('viewNombre').innerText = `${u[3]} ${u[4]}`;
            document.getElementById('viewDoc').innerText = `Documento: ${u[6]} | Email: ${u[5]}`;

            // 2. BUSCAR NOTAS (En tbl_resultados usando internalID)
            const notasLines = findMultipleLines(sqlText, 'tbl_resultados', internalID);
            const notasData = notasLines.map(line => {
                const n = parseSQLValues(line);
                return { ref: 'Módulo ID: ' + n[2], nota: n[3], fecha: n[4] };
            });
            drawTable('areaNotas', notasData, ["Módulo", "Calificación", "Fecha"], ["ref", "nota", "fecha"]);

            // 3. BUSCAR PAGOS (En fac_creditos usando Cédula)
            const pagosLines = findMultipleLines(sqlText, 'fac_creditos', cedula);
            const pagosData = pagosLines.map(line => {
                const p = parseSQLValues(line);
                return { fecha: p[1], concepto: p[6], valor: '$' + p[5] };
            });
            drawTable('areaPagos', pagosData, ["Fecha", "Concepto", "Monto"], ["fecha", "concepto", "valor"]);

            document.getElementById('resultCard').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Error de conexión o de lectura. Verifique los permisos del archivo en Drive.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // BUSCADORES DE TEXTO EN SQL
    function findLine(text, table, query) {
        const regex = new RegExp(`INSERT INTO \`${table}\` VALUES\\s*\\([^;]*'${query}'[^;]*\\);`, 'i');
        const match = text.match(regex);
        return match ? match[0] : null;
    }

    function findMultipleLines(text, table, query) {
        const regex = new RegExp(`INSERT INTO \`${table}\` VALUES\\s*\\([^;]*'${query}'[^;]*\\);`, 'gi');
        return text.match(regex) || [];
    }

    function parseSQLValues(line) {
        const start = line.indexOf('(') + 1;
        const end = line.lastIndexOf(')');
        const content = line.substring(start, end);
        // Divide por comas pero ignora las comas dentro de las comillas
        return content.split(/,(?=(?:(?:[^']*'){2})*[^']*$)/).map(v => v.trim().replace(/^'|'$/g, ""));
    }

    function drawTable(containerId, data, headers, keys) {
        let html = '<table><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
        if (data.length > 0) {
            data.forEach(row => {
                html += '<tr>' + keys.map(k => `<td>${row[k] || '---'}</td>`).join('') + '</tr>';
            });
        } else {
            html += `<tr><td colspan="${headers.length}" style="text-align:center;">No se encontraron registros vinculados.</td></tr>`;
        }
        document.getElementById(containerId).innerHTML = html + '</table>';
    }
</script>

</body>
</html>
