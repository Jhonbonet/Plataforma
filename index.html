<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Estudiantil - ASENORTE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --primary:#0d7a6e;
    --secondary:#085a52;
    --accent:#d4a017;
    --bg:#f4f7f6;
    --card:#ffffff;
    --danger:#c62828;
    --success:#2e7d32;
    --warning:#ef6c00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:var(--bg);
    padding:15px;
    color:#333;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    overflow:hidden;
}

.header{
    background:linear-gradient(135deg,var(--primary),#0aa18f);
    color:white;
    padding:30px;
    text-align:center;
}

.header h1{
    margin:0;
    font-size:34px;
}

.header p{
    margin-top:8px;
    opacity:.9;
}

.search-box{
    padding:25px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    background:#f9f9f9;
    border-bottom:1px solid #eee;
}

.search-box input{
    flex:1;
    min-width:250px;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

.search-box input:focus{
    border-color:var(--primary);
}

.search-box button{
    background:var(--primary);
    color:white;
    border:none;
    border-radius:10px;
    padding:14px 24px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.search-box button:hover{
    background:var(--secondary);
}

.loader{
    display:none;
    padding:25px;
    text-align:center;
    color:var(--primary);
    font-weight:bold;
    font-size:16px;
}

.loader i{
    margin-right:10px;
}

.result-area{
    display:none;
    padding:25px;
    animation:fade .4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.profile{
    background:linear-gradient(135deg,var(--primary),#0aa18f);
    color:white;
    border-radius:14px;
    padding:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.profile h2{
    margin-bottom:8px;
}

.profile p{
    margin:4px 0;
    opacity:.95;
}

.section{
    margin-top:30px;
}

.section-title{
    margin-bottom:15px;
    color:var(--primary);
    border-left:5px solid var(--accent);
    padding-left:12px;
}

.table-container{
    overflow:auto;
    border-radius:12px;
    border:1px solid #ddd;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

table th{
    background:#f5f5f5;
    color:var(--primary);
    font-weight:bold;
}

table th,
table td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

table tr:hover{
    background:#fafafa;
}

.badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.badge-success{
    background:#dff5e1;
    color:var(--success);
}

.badge-warning{
    background:#fff3cd;
    color:var(--warning);
}

.badge-danger{
    background:#f8d7da;
    color:var(--danger);
}

.alert{
    padding:14px;
    border-radius:10px;
    margin-top:15px;
    font-weight:bold;
}

.alert-error{
    background:#f8d7da;
    color:#721c24;
}

.alert-success{
    background:#d4edda;
    color:#155724;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.stat-box{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.stat-box h4{
    color:#777;
    margin-bottom:8px;
}

.stat-box strong{
    font-size:22px;
    color:var(--primary);
}

.footer{
    text-align:center;
    padding:20px;
    color:#888;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">
            <h1>ASENORTE</h1>
            <p>Portal Académico y Financiero</p>
        </div>

        <div class="search-box">

            <input
                type="text"
                id="docInput"
                placeholder="Ingrese número de documento"
            >

            <button onclick="consultar()">
                <i class="fas fa-search"></i>
                CONSULTAR
            </button>

        </div>

        <div id="loader" class="loader">
            <i class="fas fa-sync fa-spin"></i>
            Procesando base de datos SQL...
        </div>

        <div id="alertArea"></div>

        <div id="resultArea" class="result-area">

            <div class="profile">

                <div>
                    <h2 id="studentName"></h2>

                    <p id="studentDoc"></p>

                    <p id="studentEmail"></p>

                    <p id="studentId"></p>
                </div>

                <div>
                    <i class="fas fa-user-graduate fa-4x"></i>
                </div>

            </div>

            <div class="stats">

                <div class="stat-box">
                    <h4>Promedio Académico</h4>
                    <strong id="avgGrade">0.0</strong>
                </div>

                <div class="stat-box">
                    <h4>Total Cursos</h4>
                    <strong id="totalCourses">0</strong>
                </div>

                <div class="stat-box">
                    <h4>Total Pagado</h4>
                    <strong id="totalPaid">$0</strong>
                </div>

            </div>

            <div class="section">

                <h3 class="section-title">
                    <i class="fas fa-book"></i>
                    Historial Académico
                </h3>

                <div class="table-container">
                    <table>

                        <thead>
                        <tr>
                            <th>Módulo</th>
                            <th>Nota</th>
                            <th>Fecha</th>
                            <th>Profesor</th>
                            <th>Grupo</th>
                            <th>Estado</th>
                        </tr>
                        </thead>

                        <tbody id="tableNotas"></tbody>

                    </table>
                </div>

            </div>

            <div class="section">

                <h3 class="section-title">
                    <i class="fas fa-money-check-alt"></i>
                    Historial Financiero
                </h3>

                <div class="table-container">
                    <table>

                        <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Concepto</th>
                            <th>Valor</th>
                        </tr>
                        </thead>

                        <tbody id="tablePagos"></tbody>

                    </table>
                </div>

            </div>

        </div>

        <div class="footer">
            Sistema generado desde archivo SQL phpMyAdmin
        </div>

    </div>

</div>

<script>

/*
|--------------------------------------------------------------------------
| CONFIG
|--------------------------------------------------------------------------
*/

const URL_SQL =
'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

let sqlRaw = '';
let tablas = {};

/*
|--------------------------------------------------------------------------
| UI
|--------------------------------------------------------------------------
*/

function showLoader(show=true){

    document.getElementById('loader').style.display =
        show ? 'block' : 'none';
}

function showAlert(message,type='error'){

    const area = document.getElementById('alertArea');

    area.innerHTML = `
        <div class="alert alert-${type}">
            ${message}
        </div>
    `;

    setTimeout(()=>{
        area.innerHTML = '';
    },5000);
}

/*
|--------------------------------------------------------------------------
| SANITIZE SQL
|--------------------------------------------------------------------------
*/

function sanitize(value){

    if(value === null || value === undefined){
        return '';
    }

    return String(value)
        .replace(/\\'/g,"'")
        .replace(/\\"/g,'"')
        .replace(/\\\\/g,'\\')
        .replace(/\r/g,'')
        .replace(/\n/g,' ')
        .trim();
}

/*
|--------------------------------------------------------------------------
| CARGAR SQL
|--------------------------------------------------------------------------
*/

async function loadSQL(){

    if(sqlRaw){
        return;
    }

    const response = await fetch(URL_SQL);

    if(!response.ok){
        throw new Error(
            'No se pudo descargar el archivo SQL'
        );
    }

    sqlRaw = await response.text();

    splitTables();
}

/*
|--------------------------------------------------------------------------
| SEGMENTACIÓN
|--------------------------------------------------------------------------
*/

function splitTables(){

    /*
    Compatible phpMyAdmin:
    -- Volcado de datos para la tabla
    */

    const regex =
/-- Volcado de datos para la tabla `([^`]+)`([\s\S]*?)(?=(-- Volcado de datos para la tabla|$))/g;

    let match;

    while((match = regex.exec(sqlRaw)) !== null){

        tablas[match[1]] = match[2];
    }

    console.log('Tablas detectadas:',Object.keys(tablas));
}

/*
|--------------------------------------------------------------------------
| EXTRAER INSERTS
|--------------------------------------------------------------------------
*/

function extractInsertBlocks(section){

    if(!section){
        return [];
    }

    const regex =
        /INSERT INTO[\s\S]*?VALUES\s*([\s\S]*?);/gi;

    const blocks = [];

    let match;

    while((match = regex.exec(section)) !== null){

        blocks.push(match[1]);
    }

    return blocks;
}

/*
|--------------------------------------------------------------------------
| PARSER TUPLAS
|--------------------------------------------------------------------------
*/

function parseTuples(block){

    const rows = [];

    const regex =
        /\(([\s\S]*?)\)(?=,?\s*(\(|$))/g;

    let match;

    while((match = regex.exec(block)) !== null){

        rows.push(splitFields(match[1]));
    }

    return rows;
}

/*
|--------------------------------------------------------------------------
| SPLIT ROBUSTO SQL
|--------------------------------------------------------------------------
*/

function splitFields(row){

    const fields = [];

    let current = '';
    let inString = false;

    for(let i=0;i<row.length;i++){

        const c = row[i];
        const prev = row[i-1];

        if(c === "'" && prev !== "\\"){
            inString = !inString;
        }

        if(c === ',' && !inString){

            fields.push(cleanField(current));
            current = '';

        }else{
            current += c;
        }
    }

    fields.push(cleanField(current));

    return fields;
}

function cleanField(value){

    value = value.trim();

    if(value === 'NULL'){
        return null;
    }

    return sanitize(
        value.replace(/^'/,'').replace(/'$/,'')
    );
}

/*
|--------------------------------------------------------------------------
| BUSCAR ESTUDIANTE
|--------------------------------------------------------------------------
*/

function findStudent(documento){

    const section = tablas['tbl_usuarios'];

    if(!section){
        return null;
    }

    const inserts = extractInsertBlocks(section);

    for(const block of inserts){

        const rows = parseTuples(block);

        for(const row of rows){

            /*
            AJUSTAR SI LA ESTRUCTURA CAMBIA
            */

            const id = row[0];
            const nombre = row[3] || '';
            const apellido = row[4] || '';
            const email = row[5] || '';
            const doc = row[6] || row[2];

            if(String(doc) === String(documento)){

                return {
                    id,
                    nombreCompleto:
                        `${nombre} ${apellido}`.trim(),
                    documento:doc,
                    email
                };
            }
        }
    }

    return null;
}

/*
|--------------------------------------------------------------------------
| BUSCAR NOTAS
|--------------------------------------------------------------------------
*/

function findGrades(studentId){

    const section = tablas['tbl_resultados'];

    if(!section){
        return [];
    }

    const inserts = extractInsertBlocks(section);

    const result = [];

    for(const block of inserts){

        const rows = parseTuples(block);

        for(const row of rows){

            /*
            row[1] = id_usuario
            */

            if(String(row[1]) === String(studentId)){

                result.push({

                    modulo:
                        row[2] || 'Sin módulo',

                    nota:
                        parseFloat(row[3]) || 0,

                    fecha:
                        row[4] || '---',

                    profesor:
                        row[5] || 'No asignado',

                    grupo:
                        row[6] || '---'
                });
            }
        }
    }

    return result;
}

/*
|--------------------------------------------------------------------------
| BUSCAR PAGOS
|--------------------------------------------------------------------------
*/

function findPayments(documento){

    const section = tablas['fac_creditos'];

    if(!section){
        return [];
    }

    const inserts = extractInsertBlocks(section);

    const pagos = [];

    for(const block of inserts){

        const rows = parseTuples(block);

        for(const row of rows){

            /*
            CLIENTE_CREDITO = row[4]
            */

            if(String(row[4]) === String(documento)){

                pagos.push({

                    fecha:
                        row[1] || '---',

                    valor:
                        parseFloat(row[5]) || 0,

                    concepto:
                        row[6] || 'Pago'
                });
            }
        }
    }

    return pagos;
}

/*
|--------------------------------------------------------------------------
| RENDER
|--------------------------------------------------------------------------
*/

function renderStudent(student){

    document.getElementById('studentName')
        .innerText = student.nombreCompleto;

    document.getElementById('studentDoc')
        .innerText = 'Documento: ' + student.documento;

    document.getElementById('studentEmail')
        .innerText = 'Correo: ' + student.email;

    document.getElementById('studentId')
        .innerText = 'ID Interno: ' + student.id;
}

function renderGrades(grades){

    const tbody =
        document.getElementById('tableNotas');

    tbody.innerHTML = '';

    if(!grades.length){

        tbody.innerHTML = `
            <tr>
                <td colspan="6">
                    No hay notas registradas
                </td>
            </tr>
        `;

        return;
    }

    let total = 0;

    grades.forEach(g=>{

        total += Number(g.nota);

        const estado =
            g.nota >= 3
            ? '<span class="badge badge-success">APROBADO</span>'
            : '<span class="badge badge-danger">REPROBADO</span>';

        tbody.innerHTML += `
            <tr>
                <td>${g.modulo}</td>
                <td>${g.nota}</td>
                <td>${g.fecha}</td>
                <td>${g.profesor}</td>
                <td>${g.grupo}</td>
                <td>${estado}</td>
            </tr>
        `;
    });

    const promedio =
        (total / grades.length).toFixed(2);

    document.getElementById('avgGrade')
        .innerText = promedio;

    document.getElementById('totalCourses')
        .innerText = grades.length;
}

function renderPayments(payments){

    const tbody =
        document.getElementById('tablePagos');

    tbody.innerHTML = '';

    if(!payments.length){

        tbody.innerHTML = `
            <tr>
                <td colspan="3">
                    No hay pagos registrados
                </td>
            </tr>
        `;

        document.getElementById('totalPaid')
            .innerText = '$0';

        return;
    }

    let total = 0;

    payments.forEach(p=>{

        total += Number(p.valor);

        tbody.innerHTML += `
            <tr>
                <td>${p.fecha}</td>
                <td>${p.concepto}</td>
                <td>
                    ${formatMoney(p.valor)}
                </td>
            </tr>
        `;
    });

    document.getElementById('totalPaid')
        .innerText = formatMoney(total);
}

/*
|--------------------------------------------------------------------------
| MONEY
|--------------------------------------------------------------------------
*/

function formatMoney(value){

    return Number(value).toLocaleString(
        'es-CO',
        {
            style:'currency',
            currency:'COP',
            minimumFractionDigits:0
        }
    );
}

/*
|--------------------------------------------------------------------------
| CONSULTA PRINCIPAL
|--------------------------------------------------------------------------
*/

async function consultar(){

    const documento =
        document.getElementById('docInput')
        .value
        .trim();

    if(!documento){

        showAlert(
            'Ingrese un número de documento'
        );

        return;
    }

    try{

        showLoader(true);

        document.getElementById('resultArea')
            .style.display = 'none';

        await loadSQL();

        /*
        ---------------------------------------------------------------
        PASO 1
        tbl_usuarios
        ---------------------------------------------------------------
        */

        const student =
            findStudent(documento);

        if(!student){

            showAlert(
                'No se encontró el estudiante'
            );

            showLoader(false);

            return;
        }

        /*
        ---------------------------------------------------------------
        PASO 2
        tbl_resultados
        ---------------------------------------------------------------
        */

        const grades =
            findGrades(student.id);

        /*
        ---------------------------------------------------------------
        PASO 3
        fac_creditos
        ---------------------------------------------------------------
        */

        const payments =
            findPayments(documento);

        renderStudent(student);
        renderGrades(grades);
        renderPayments(payments);

        document.getElementById('resultArea')
            .style.display = 'block';

        showAlert(
            'Consulta realizada correctamente',
            'success'
        );

    }catch(error){

        console.error(error);

        showAlert(
            'Error procesando el archivo SQL'
        );

    }finally{

        showLoader(false);
    }
}

/*
|--------------------------------------------------------------------------
| ENTER
|--------------------------------------------------------------------------
*/

document
.getElementById('docInput')
.addEventListener('keypress',function(e){

    if(e.key === 'Enter'){
        consultar();
    }
});

</script>

</body>
</html>
