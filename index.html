<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 6px; }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; }
        .card { display: none; border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: var(--primary); color: white; }
        .loader { display: none; text-align: center; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PORTAL ESTUDIANTIL ASENORTE</h1>
        <p>Consulta desde Base de Datos SQL</p>
    </div>

    <div class="search-box">
        <input type="text" id="studentDoc" placeholder="Ingrese Identificación del Estudiante...">
        <button onclick="consultarSQL()"><i class="fas fa-search"></i> Consultar</button>
    </div>

    <div id="loader" class="loader">Procesando Base de Datos...</div>

    <div id="resultCard" class="card">
        <h2 id="studentName"></h2>
        
        <h3><i class="fas fa-graduation-cap"></i> Calificaciones</h3>
        <div id="tablaNotas"></div>

        <h3><i class="fas fa-wallet"></i> Registro de Pagos</h3>
        <div id="tablaPagos"></div>
    </div>
</div>

<script>
    let db = null;

    // Inicializar el motor SQL
    async function initSql() {
        const sqlPromise = initSqlJs({
            locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
        });
        const dataPromise = fetch("asenorte.sql").then(res => res.arrayBuffer());
        
        const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
        db = new SQL.Database(new Uint8Array(buf));
        console.log("Base de datos SQL cargada correctamente");
    }

    // Ejecutar al cargar la página
    initSql().catch(err => console.error("Error cargando SQL:", err));

    async function consultarSQL() {
        const doc = document.getElementById('studentDoc').value;
        if (!doc) return alert("Ingrese un documento");
        if (!db) return alert("La base de datos aún se está cargando. Espere un momento.");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';

        try {
            // Consulta 1: Datos del Estudiante (Ajusta los nombres de tabla/columna según tu .sql)
            // Ejemplo: asumiendo tabla 'estudiantes' y columna 'documento'
            const resEst = db.exec(`SELECT nombre FROM estudiantes WHERE documento = '${doc}' LIMIT 1`);
            
            if (resEst.length === 0) {
                alert("Estudiante no encontrado en la base de datos.");
                return;
            }

            document.getElementById('studentName').innerText = resEst[0].values[0][0];

            // Consulta 2: Notas (Ajusta tabla 'notas')
            const resNotas = db.exec(`SELECT materia, nota FROM notas WHERE documento = '${doc}'`);
            renderTable('tablaNotas', resNotas, ["Materia", "Calificación"]);

            // Consulta 3: Pagos (Ajusta tabla 'pagos')
            const resPagos = db.exec(`SELECT fecha, concepto, valor FROM pagos WHERE documento = '${doc}'`);
            renderTable('tablaPagos', resPagos, ["Fecha", "Concepto", "Valor"]);

            document.getElementById('resultCard').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Error en la consulta SQL. Verifique que los nombres de tablas y columnas sean correctos.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderTable(elementId, result, headers) {
        let html = '<table><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr>';

        if (result.length > 0) {
            result[0].values.forEach(row => {
                html += '<tr>';
                row.forEach(cell => html += `<td>${cell}</td>`);
                html += '</tr>';
            });
        } else {
            html += `<tr><td colspan="${headers.length}">No se encontraron registros</td></tr>`;
        }
        
        document.getElementById(elementId).innerHTML = html + '</table>';
    }
</script>

</body>
</html>
