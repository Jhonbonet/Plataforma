<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .card { display: none; border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-top: 20px; animation: fadeIn 0.5s; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: var(--primary); color: white; }
        .loader { display: none; text-align: center; font-weight: bold; color: var(--primary); margin: 20px 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150x50?text=ASENORTE" alt="Logo ASENORTE" style="max-width: 200px; margin-bottom: 10px;">
        <h1>PORTAL ESTUDIANTIL</h1>
        <p>Consulta de Notas y Pagos</p>
    </div>

    <div class="search-box">
        <input type="text" id="studentDoc" placeholder="Número de Documento (Ej: 123456)">
        <button onclick="consultarSQL()"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loader" class="loader">
        <i class="fas fa-spinner fa-spin"></i> Conectando con la base de datos...
    </div>

    <div id="resultCard" class="card">
        <h2 id="studentName" style="color: var(--primary);"></h2>
        
        <h3><i class="fas fa-graduation-cap"></i> Calificaciones</h3>
        <div id="tablaNotas"></div>

        <h3><i class="fas fa-wallet"></i> Historial de Pagos</h3>
        <div id="tablaPagos"></div>
    </div>
</div>

<script>
    let db = null;
    // URL de descarga directa de tu archivo en Google Drive
    const SQL_URL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

    async function initSql() {
        try {
            const sqlPromise = initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
            });
            
            // Descargamos el archivo asenorte.sql desde Drive
            const dataPromise = fetch(SQL_URL).then(res => {
                if (!res.ok) throw new Error("Error al descargar el archivo SQL desde Drive");
                return res.arrayBuffer();
            });
            
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            console.log("Base de datos cargada correctamente");
        } catch (err) {
            console.error(err);
            alert("Error crítico: No se pudo cargar la base de datos. Verifica tu conexión.");
        }
    }

    // Inicializar al cargar
    initSql();

    async function consultarSQL() {
        const doc = document.getElementById('studentDoc').value.trim();
        if (!doc) return alert("Por favor, ingresa un número de documento.");
        if (!db) return alert("La base de datos aún se está cargando. Intenta de nuevo en 3 segundos.");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';

        try {
            // CONSULTA 1: Nombre del Estudiante
            // NOTA: Ajusta 'estudiantes' y 'nombre' según las tablas de tu archivo .sql
            const resEst = db.exec(`SELECT nombre FROM estudiantes WHERE documento = '${doc}' LIMIT 1`);
            
            if (resEst.length === 0 || resEst[0].values.length === 0) {
                alert("No se encontró ningún estudiante con ese documento.");
                return;
            }

            document.getElementById('studentName').innerText = "Bienvenido, " + resEst[0].values[0][0];

            // CONSULTA 2: Notas
            const resNotas = db.exec(`SELECT materia, nota FROM notas WHERE documento = '${doc}'`);
            renderTable('tablaNotas', resNotas, ["Materia", "Nota"]);

            // CONSULTA 3: Pagos
            const resPagos = db.exec(`SELECT fecha, concepto, valor FROM pagos WHERE documento = '${doc}'`);
            renderTable('tablaPagos', resPagos, ["Fecha", "Concepto", "Valor"]);

            document.getElementById('resultCard').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Error en la consulta. Asegúrate de que las tablas en asenorte.sql se llamen 'estudiantes', 'notas' y 'pagos'.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderTable(elementId, result, headers) {
        let html = '<table><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr>';

        if (result.length > 0 && result[0].values.length > 0) {
            result[0].values.forEach(row => {
                html += '<tr>';
                row.forEach(cell => html += `<td>${cell}</td>`);
                html += '</tr>';
            });
        } else {
            html += `<tr><td colspan="${headers.length}">Sin registros encontrados.</td></tr>`;
        }
        
        document.getElementById(elementId).innerHTML = html + '</table>';
    }
</script>

</body>
</html>
