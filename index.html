<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASENORTE - Portal Estudiantil</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --primary:#0d7a6e;
    --secondary:#085a52;
    --accent:#d4a017;
    --bg:#f4f7f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:'Segoe UI',Tahoma,sans-serif;
    padding:15px;
    color:#333;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.1);
}

.header{
    background:linear-gradient(135deg,var(--primary),#13a391);
    color:white;
    text-align:center;
    padding:35px;
}

.header h1{
    font-size:42px;
}

.header p{
    margin-top:10px;
    opacity:.95;
}

.search-box{
    padding:25px;
    background:#f9f9f9;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.search-box input{
    flex:1;
    min-width:250px;
    padding:15px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:16px;
    outline:none;
}

.search-box input:focus{
    border-color:var(--primary);
}

.search-box button{
    background:var(--primary);
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
}

.search-box button:hover{
    background:var(--secondary);
}

.loader{
    display:none;
    text-align:center;
    padding:25px;
    color:var(--primary);
    font-weight:bold;
}

.result{
    display:none;
    padding:25px;
}

.profile{
    background:linear-gradient(135deg,var(--primary),#13a391);
    color:white;
    padding:25px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.section{
    margin-top:30px;
}

.section h3{
    color:var(--primary);
    margin-bottom:15px;
    border-left:5px solid var(--accent);
    padding-left:10px;
}

.table-wrap{
    overflow:auto;
    border:1px solid #ddd;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#f5f5f5;
    color:var(--primary);
}

table th,
table td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

.badge{
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.ok{
    background:#d4edda;
    color:#155724;
}

.bad{
    background:#f8d7da;
    color:#721c24;
}

.alert{
    margin:15px 25px;
    padding:14px;
    border-radius:10px;
    font-weight:bold;
}

.error{
    background:#f8d7da;
    color:#721c24;
}

.success{
    background:#d4edda;
    color:#155724;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.stat{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.stat h4{
    color:#777;
    margin-bottom:10px;
}

.stat strong{
    color:var(--primary);
    font-size:24px;
}

.footer{
    text-align:center;
    padding:20px;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
    <h1>ASENORTE</h1>
    <p>Portal Académico y Financiero</p>
</div>

<div class="search-box">

    <input
        type="text"
        id="docInput"
        placeholder="Ingrese número de documento"
    >

    <button onclick="consultar()">
        <i class="fas fa-search"></i>
        CONSULTAR
    </button>

</div>

<div id="loader" class="loader">
    <i class="fas fa-sync fa-spin"></i>
    Procesando base SQL...
</div>

<div id="alerts"></div>

<div id="result" class="result">

    <div class="profile">

        <div>
            <h2 id="nombre"></h2>
            <p id="doc"></p>
            <p id="correo"></p>
            <p id="idinterno"></p>
        </div>

        <i class="fas fa-user-graduate fa-4x"></i>

    </div>

    <div class="stats">

        <div class="stat">
            <h4>Promedio</h4>
            <strong id="promedio">0</strong>
        </div>

        <div class="stat">
            <h4>Total Cursos</h4>
            <strong id="materias">0</strong>
        </div>

        <div class="stat">
            <h4>Total Pagado</h4>
            <strong id="pagado">$0</strong>
        </div>

    </div>

    <div class="section">

        <h3>
            <i class="fas fa-book"></i>
            Historial Académico
        </h3>

        <div class="table-wrap">

            <table>

                <thead>
                <tr>
                    <th>Módulo</th>
                    <th>Nota</th>
                    <th>Fecha</th>
                    <th>Profesor</th>
                    <th>Grupo</th>
                    <th>Estado</th>
                </tr>
                </thead>

                <tbody id="notasBody"></tbody>

            </table>

        </div>

    </div>

    <div class="section">

        <h3>
            <i class="fas fa-money-bill-wave"></i>
            Historial Financiero
        </h3>

        <div class="table-wrap">

            <table>

                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Concepto</th>
                    <th>Valor</th>
                </tr>
                </thead>

                <tbody id="pagosBody"></tbody>

            </table>

        </div>

    </div>

</div>

<div class="footer">
    Sistema SQL phpMyAdmin
</div>

</div>
</div>

<script>

/*
|--------------------------------------------------------------------------
| CONFIG
|--------------------------------------------------------------------------
*/

const SQL_URLS = [

'https://drive.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z',

'https://drive.usercontent.google.com/download?id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z&export=download&confirm=t'

];

let SQL_TEXT = '';
let TABLES = {};

/*
|--------------------------------------------------------------------------
| UI
|--------------------------------------------------------------------------
*/

function loader(show=true){

    document.getElementById('loader').style.display =
        show ? 'block' : 'none';
}

function alertMsg(msg,type='error'){

    document.getElementById('alerts').innerHTML =
    `<div class="alert ${type}">${msg}</div>`;
}

/*
|--------------------------------------------------------------------------
| SANITIZE
|--------------------------------------------------------------------------
*/

function clean(v){

    if(v === null || v === undefined){
        return '';
    }

    return String(v)
        .replace(/\\'/g,"'")
        .replace(/\\"/g,'"')
        .replace(/\\\\/g,'\\')
        .replace(/\r/g,'')
        .replace(/\n/g,' ')
        .trim();
}

/*
|--------------------------------------------------------------------------
| CARGAR SQL
|--------------------------------------------------------------------------
*/

async function loadSQL(){

    if(SQL_TEXT){
        return;
    }

    let success = false;

    for(const url of SQL_URLS){

        try{

            const response = await fetch(url);

            const text = await response.text();

            /*
            VALIDAR SI REALMENTE ES SQL
            */

            if(
                text.includes('INSERT INTO') ||
                text.includes('CREATE TABLE')
            ){

                SQL_TEXT = text;
                success = true;
                break;
            }

        }catch(err){

            console.log('Intento fallido:',url);
        }
    }

    if(!success){

        throw new Error(
            'Google Drive bloqueó el acceso al SQL'
        );
    }

    splitTables();
}

/*
|--------------------------------------------------------------------------
| SEGMENTAR TABLAS
|--------------------------------------------------------------------------
*/

function splitTables(){

    const regex =
/-- Volcado de datos para la tabla `([^`]+)`([\s\S]*?)(?=(-- Volcado de datos para la tabla|$))/g;

    let match;

    while((match = regex.exec(SQL_TEXT)) !== null){

        TABLES[match[1]] = match[2];
    }

    console.log(TABLES);
}

/*
|--------------------------------------------------------------------------
| EXTRAER INSERTS
|--------------------------------------------------------------------------
*/

function getInsertBlocks(section){

    if(!section){
        return [];
    }

    const regex =
/INSERT INTO[\s\S]*?VALUES\s*([\s\S]*?);/gi;

    let blocks = [];

    let match;

    while((match = regex.exec(section)) !== null){

        blocks.push(match[1]);
    }

    return blocks;
}

/*
|--------------------------------------------------------------------------
| PARSE TUPLAS
|--------------------------------------------------------------------------
*/

function parseRows(block){

    const rows = [];

    const regex =
/\(([\s\S]*?)\)(?=,?\s*(\(|$))/g;

    let match;

    while((match = regex.exec(block)) !== null){

        rows.push(splitFields(match[1]));
    }

    return rows;
}

function splitFields(row){

    const result = [];

    let current = '';
    let inside = false;

    for(let i=0;i<row.length;i++){

        const c = row[i];
        const prev = row[i-1];

        if(c === "'" && prev !== "\\"){
            inside = !inside;
        }

        if(c === ',' && !inside){

            result.push(
                current.trim()
                .replace(/^'/,'')
                .replace(/'$/,'')
            );

            current='';

        }else{
            current += c;
        }
    }

    result.push(
        current.trim()
        .replace(/^'/,'')
        .replace(/'$/,'')
    );

    return result.map(clean);
}

/*
|--------------------------------------------------------------------------
| USUARIO
|--------------------------------------------------------------------------
*/

function findUser(documento){

    const sec = TABLES['tbl_usuarios'];

    if(!sec){
        return null;
    }

    const inserts = getInsertBlocks(sec);

    for(const block of inserts){

        const rows = parseRows(block);

        for(const r of rows){

            const id = r[0];
            const doc = r[6] || r[2];

            if(String(doc) === String(documento)){

                return {

                    id:id,
                    nombre:
                        `${r[3]||''} ${r[4]||''}`,

                    documento:doc,

                    email:r[5] || ''
                };
            }
        }
    }

    return null;
}

/*
|--------------------------------------------------------------------------
| NOTAS
|--------------------------------------------------------------------------
*/

function findGrades(userId){

    const sec = TABLES['tbl_resultados'];

    if(!sec){
        return [];
    }

    const inserts = getInsertBlocks(sec);

    const data = [];

    for(const block of inserts){

        const rows = parseRows(block);

        for(const r of rows){

            if(String(r[1]) === String(userId)){

                data.push({

                    modulo:r[2] || 'N/A',
                    nota:parseFloat(r[3]) || 0,
                    fecha:r[4] || '---',
                    profesor:r[5] || '---',
                    grupo:r[6] || '---'
                });
            }
        }
    }

    return data;
}

/*
|--------------------------------------------------------------------------
| PAGOS
|--------------------------------------------------------------------------
*/

function findPayments(documento){

    const sec = TABLES['fac_creditos'];

    if(!sec){
        return [];
    }

    const inserts = getInsertBlocks(sec);

    const data = [];

    for(const block of inserts){

        const rows = parseRows(block);

        for(const r of rows){

            if(String(r[4]) === String(documento)){

                data.push({

                    fecha:r[1],
                    concepto:r[6],
                    valor:parseFloat(r[5]) || 0
                });
            }
        }
    }

    return data;
}

/*
|--------------------------------------------------------------------------
| MONEY
|--------------------------------------------------------------------------
*/

function money(v){

    return Number(v).toLocaleString(
        'es-CO',
        {
            style:'currency',
            currency:'COP',
            minimumFractionDigits:0
        }
    );
}

/*
|--------------------------------------------------------------------------
| RENDER
|--------------------------------------------------------------------------
*/

function renderUser(u){

    document.getElementById('nombre').innerText =
        u.nombre;

    document.getElementById('doc').innerText =
        'Documento: ' + u.documento;

    document.getElementById('correo').innerText =
        'Correo: ' + u.email;

    document.getElementById('idinterno').innerText =
        'ID Interno: ' + u.id;
}

function renderGrades(grades){

    const body =
        document.getElementById('notasBody');

    body.innerHTML='';

    let total = 0;

    grades.forEach(g=>{

        total += Number(g.nota);

        body.innerHTML += `
        <tr>

            <td>${g.modulo}</td>

            <td>${g.nota}</td>

            <td>${g.fecha}</td>

            <td>${g.profesor}</td>

            <td>${g.grupo}</td>

            <td>
                ${
                    g.nota >= 3
                    ? '<span class="badge ok">APROBADO</span>'
                    : '<span class="badge bad">REPROBADO</span>'
                }
            </td>

        </tr>
        `;
    });

    document.getElementById('promedio')
        .innerText =
        grades.length
        ? (total/grades.length).toFixed(2)
        : '0';

    document.getElementById('materias')
        .innerText = grades.length;
}

function renderPayments(payments){

    const body =
        document.getElementById('pagosBody');

    body.innerHTML='';

    let total = 0;

    payments.forEach(p=>{

        total += Number(p.valor);

        body.innerHTML += `
        <tr>

            <td>${p.fecha}</td>

            <td>${p.concepto}</td>

            <td>${money(p.valor)}</td>

        </tr>
        `;
    });

    document.getElementById('pagado')
        .innerText = money(total);
}

/*
|--------------------------------------------------------------------------
| CONSULTAR
|--------------------------------------------------------------------------
*/

async function consultar(){

    const documento =
        document.getElementById('docInput')
        .value
        .trim();

    if(!documento){

        alertMsg(
            'Ingrese un documento'
        );

        return;
    }

    try{

        loader(true);

        document.getElementById('result')
            .style.display='none';

        await loadSQL();

        /*
        PASO 1
        */

        const user =
            findUser(documento);

        if(!user){

            alertMsg(
                'Estudiante no encontrado'
            );

            loader(false);

            return;
        }

        /*
        PASO 2
        */

        const grades =
            findGrades(user.id);

        /*
        PASO 3
        */

        const payments =
            findPayments(documento);

        renderUser(user);

        renderGrades(grades);

        renderPayments(payments);

        document.getElementById('result')
            .style.display='block';

        alertMsg(
            'Consulta realizada correctamente',
            'success'
        );

    }catch(err){

        console.error(err);

        alertMsg(
            'Error leyendo el SQL desde Google Drive'
        );
    }

    loader(false);
}

/*
|--------------------------------------------------------------------------
| ENTER
|--------------------------------------------------------------------------
*/

document
.getElementById('docInput')
.addEventListener('keypress',e=>{

    if(e.key === 'Enter'){
        consultar();
    }
});

</script>

</body>
</html>
