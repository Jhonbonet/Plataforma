<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d7a6e; --accent: #d4a017; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.15); }
        .header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #e9ecef; padding: 25px; border-radius: 10px; }
        input { flex: 1; max-width: 350px; padding: 14px; border: 2px solid #ced4da; border-radius: 8px; font-size: 16px; }
        button { padding: 14px 28px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .result-card { display: none; }
        .profile-banner { background: linear-gradient(135deg, var(--primary), #13a392); color: white; padding: 25px; border-radius: 10px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 14px; border: 1px solid #dee2e6; text-align: left; }
        th { background: #f8f9fa; color: var(--primary); font-weight: bold; }
        .loader { display: none; text-align: center; padding: 30px; font-size: 18px; color: var(--primary); }
        h3 { color: var(--primary); border-left: 5px solid var(--accent); padding-left: 12px; margin-top: 35px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; color: var(--primary); font-size: 2.2em;">ASENORTE</h1>
        <p style="margin:5px 0 0 0; color: #555;">Consulta de Calificaciones y Estado Financiero</p>
    </div>

    <div class="search-box">
        <input type="text" id="docInput" placeholder="Ingrese su Cédula / Documento">
        <button onclick="iniciarConsulta()"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loader" class="loader"><i class="fas fa-circle-notch fa-spin"></i> Procesando Base de Datos SQL...</div>

    <div id="resultArea" class="result-card">
        <div class="profile-banner">
            <h2 id="stName" style="margin:0;"></h2>
            <p id="stId" style="margin:8px 0 0 0; font-size: 1.1em; opacity: 0.9;"></p>
        </div>

        <h3><i class="fas fa-graduation-cap"></i> Mis Calificaciones</h3>
        <div id="areaNotas"></div>

        <h3><i class="fas fa-file-invoice-dollar"></i> Registro de Pagos y Créditos</h3>
        <div id="areaPagos"></div>
    </div>
</div>

<script>
    // URL de descarga del archivo SQL de Google Drive
    const SQL_FILE_URL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

    async function iniciarConsulta() {
        const cedula = document.getElementById('docInput').value.trim();
        if (!cedula) return alert("Por favor, escriba su documento.");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            const resp = await fetch(SQL_FILE_URL);
            const fullText = await resp.text();

            // Segmentar el archivo por tablas usando los delimitadores de phpMyAdmin
            const secciones = fullText.split('-- Volcado de datos para la tabla');

            // 1. Obtener datos del Estudiante en `tbl_usuarios`
            const secUsuarios = secciones.find(s => s.includes('`tbl_usuarios`'));
            const userRow = buscarFila(secUsuarios, cedula);

            if (!userRow) {
                alert("No se encontró ningún estudiante con esa identificación.");
                return;
            }

            const uData = limpiarValores(userRow);
            const idInterno = uData[0]; // ID Primario para vincular resultados

            document.getElementById('stName').innerText = `${uData[3]} ${uData[4]}`;
            document.getElementById('stId').innerText = `Documento: ${uData[6]} | Correo: ${uData[5]}`;

            // 2. Obtener Calificaciones en `tbl_resultados` usando el idInterno
            const secResultados = secciones.find(s => s.includes('`tbl_resultados`'));
            const notasLines = buscarLineasMultiples(secResultados, idInterno);
            const notas = notasLines.map(line => {
                const n = limpiarValores(line);
                return { modulo: 'Módulo Ref: ' + n[2], nota: n[3], fecha: n[4] };
            });
            pintarTabla('areaNotas', notas, ["Referencia", "Nota", "Fecha"], ["modulo", "nota", "fecha"]);

            // 3. Obtener Pagos en `fac_creditos` usando la Cédula
            const secPagos = secciones.find(s => s.includes('`fac_creditos`'));
            const pagosLines = buscarLineasMultiples(secPagos, cedula);
            const pagos = pagosLines.map(line => {
                const p = limpiarValores(line);
                return { fecha: p[1], concepto: p[6], valor: '$' + p[5] };
            });
            pintarTabla('areaPagos', pagos, ["Fecha", "Concepto", "Monto"], ["fecha", "concepto", "valor"]);

            document.getElementById('resultArea').style.display = 'block';

        } catch (err) {
            console.error(err);
            alert("Error al cargar los datos. Verifique que el archivo SQL en Drive sea público.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // Funciones de procesamiento de texto SQL
    function buscarFila(seccion, criterio) {
        if (!seccion) return null;
        const lineas = seccion.split('\n');
        return lineas.find(l => l.includes(`'${criterio}'`)) || null;
    }

    function buscarLineasMultiples(seccion, criterio) {
        if (!seccion) return [];
        const lineas = seccion.split('\n');
        return lineas.filter(l => l.includes(`'${criterio}'`) || l.includes(`, ${criterio},`));
    }

    function limpiarValores(linea) {
        // Extrae el contenido entre los paréntesis de VALUES(...)
        const match = linea.match(/\((.*)\)/);
        if (!match) return [];
        // Divide por comas pero protege las que están dentro de comillas
        return match[1].split(/,(?=(?:(?:[^']*'){2})*[^']*$)/).map(v => v.trim().replace(/^'|'$/g, ""));
    }

    function pintarTabla(divId, datos, cabeceras, keys) {
        let h = '<table><thead><tr>' + cabeceras.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
        if (datos.length > 0) {
            datos.forEach(d => {
                h += '<tr>' + keys.map(k => `<td>${d[k] || '---'}</td>`).join('') + '</tr>';
            });
        } else {
            h += `<tr><td colspan="${cabeceras.length}" style="text-align:center;">No se encontraron registros.</td></tr>`;
        }
        document.getElementById(divId).innerHTML = h + '</tbody></table>';
    }
</script>
</body>
</html>
