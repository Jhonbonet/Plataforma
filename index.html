<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d7a6e; --accent: #d4a017; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #eee; padding: 25px; border-radius: 10px; flex-wrap: wrap; }
        input { flex: 1; max-width: 350px; padding: 14px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 14px 28px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #085a52; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result-card { display: none; animation: slideUp 0.5s ease; }
        .profile-header { background: var(--primary); color: white; padding: 25px; border-radius: 10px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .profile-header h2 { margin: 0; word-break: break-word; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; overflow-x: auto; display: block; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background: #f1f1f1; color: var(--primary); font-weight: bold; }
        .loader { display: none; text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
        h3 { color: var(--primary); border-left: 5px solid var(--accent); padding-left: 12px; margin-top: 30px; }
        .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #f5c6cb; }
        .empty-message { background: #e2f0fb; color: #004085; padding: 12px; border-radius: 8px; text-align: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; color: var(--primary);">ASENORTE</h1>
        <p style="margin:5px 0 0 0; color: #666;">Portal de Consulta Académica y Financiera</p>
    </div>

    <div class="search-box">
        <input type="text" id="docInput" placeholder="Número de Cédula o ID" onkeypress="if(event.key==='Enter') consultar()">
        <button onclick="consultar()" id="searchBtn"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Accediendo a la base de datos SQL...</div>

    <div id="resultArea" class="result-card">
        <div class="profile-header">
            <div style="flex:1">
                <h2 id="viewName" style="margin:0;"></h2>
                <p id="viewInfo" style="margin:5px 0 0 0; opacity: 0.9;"></p>
            </div>
            <i class="fas fa-user-circle fa-3x"></i>
        </div>

        <h3><i class="fas fa-star"></i> Mis Calificaciones</h3>
        <div id="tableNotas"></div>

        <h3><i class="fas fa-receipt"></i> Historial de Pagos</h3>
        <div id="tablePagos"></div>
    </div>
</div>

<script>
    // URL de descarga del archivo SQL (asegúrate que sea público)
    const URL_SQL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

    // Variables globales para cache
    let cachedData = null;

    async function consultar() {
        const busqueda = document.getElementById('docInput').value.trim();
        if (!busqueda) {
            alert("⚠️ Por favor, ingrese un número de cédula o ID");
            return;
        }

        const searchBtn = document.getElementById('searchBtn');
        searchBtn.disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            // Cargar o usar cache del SQL
            let sqlText;
            if (cachedData) {
                sqlText = cachedData;
            } else {
                const response = await fetch(URL_SQL);
                if (!response.ok) throw new Error(`HTTP ${response.status}: No se pudo descargar el archivo SQL`);
                sqlText = await response.text();
                cachedData = sqlText;
            }

            // Parsear tablas del SQL
            const tables = parseSQLTables(sqlText);
            
            // Buscar usuario en tbl_usuarios
            const usuario = buscarUsuario(tables.tbl_usuarios, busqueda);
            
            if (!usuario) {
                mostrarError(`No se encontró ningún estudiante con el documento: ${busqueda}`);
                return;
            }

            // Mostrar información del usuario
            const nombreCompleto = `${usuario.nombres || ''} ${usuario.apellidos || ''}`.trim() || usuario.usuario || 'Sin nombre';
            document.getElementById('viewName').innerText = nombreCompleto.toUpperCase();
            document.getElementById('viewInfo').innerText = `Documento: ${usuario.documento || busqueda} | Correo: ${usuario.email || 'No registrado'}`;

            // Buscar notas del usuario (por id_usuario)
            const notasUsuario = buscarNotas(tables.tbl_resultados, usuario.id, usuario.documento);
            renderNotas(notasUsuario);

            // Buscar pagos del usuario (por documento)
            const pagosUsuario = buscarPagos(tables.fac_creditos, usuario.documento);
            renderPagos(pagosUsuario);

            document.getElementById('resultArea').style.display = 'block';

        } catch (e) {
            console.error('Error detallado:', e);
            let errorMsg = "Error al cargar la base de datos. ";
            if (e.message.includes('Failed to fetch')) {
                errorMsg += "No se pudo descargar el archivo. Verifica: 1) El archivo existe en Drive 2) Es público 3) La URL es correcta";
            } else if (e.message.includes('HTTP')) {
                errorMsg += e.message;
            } else {
                errorMsg += "Verifique los permisos del archivo en Google Drive (debe ser público).";
            }
            mostrarError(errorMsg);
        } finally {
            document.getElementById('loader').style.display = 'none';
            searchBtn.disabled = false;
        }
    }

    // Función mejorada para parsear tablas SQL
    function parseSQLTables(sqlText) {
        const tables = {
            tbl_usuarios: [],
            tbl_resultados: [],
            fac_creditos: []
        };

        // Dividir por comandos INSERT
        const insertRegex = /INSERT\s+INTO\s+`?(\w+)`?\s+VALUES\s*(\([^;]+\);?)/gi;
        let match;

        while ((match = insertRegex.exec(sqlText)) !== null) {
            const tableName = match[1];
            const valuesBlock = match[2];
            
            if (!tables[tableName]) continue;

            // Extraer todas las filas del bloque VALUES
            const rows = extractRows(valuesBlock);
            
            for (const row of rows) {
                const parsedRow = parseRow(row);
                if (parsedRow) {
                    tables[tableName].push(parsedRow);
                }
            }
        }

        return tables;
    }

    // Extraer filas individuales de un bloque VALUES
    function extractRows(valuesBlock) {
        // Remover "VALUES" al inicio si existe
        let clean = valuesBlock.replace(/^VALUES\s*/i, '');
        
        // Buscar patrones de filas: (valores)
        const rowRegex = /\(([^)]+(?:\)\s*,\s*\()?[^)]*)\)/g;
        const rows = [];
        let rowMatch;
        
        while ((rowMatch = rowRegex.exec(clean)) !== null) {
            let rowContent = rowMatch[1];
            // Si la fila está truncada, intentar recuperar
            if (rowContent.split("'").length % 2 === 0) {
                // Buscar el siguiente paréntesis
                const nextParen = clean.indexOf('(', rowMatch.index + 1);
                if (nextParen !== -1) {
                    const extendedMatch = clean.substring(rowMatch.index, nextParen);
                    const extendedRowMatch = extendedMatch.match(/\(([^)]+)\)/);
                    if (extendedRowMatch) {
                        rowContent = extendedRowMatch[1];
                    }
                }
            }
            rows.push(rowContent);
        }
        
        return rows;
    }

    // Parsear una fila de valores SQL respetando strings entre comillas
    function parseRow(rowStr) {
        const values = [];
        let current = '';
        let inQuote = false;
        let i = 0;
        
        while (i < rowStr.length) {
            const char = rowStr[i];
            
            if (char === "'" && (i === 0 || rowStr[i-1] !== '\\')) {
                inQuote = !inQuote;
                current += char;
            } else if (char === ',' && !inQuote) {
                values.push(cleanValue(current.trim()));
                current = '';
            } else {
                current += char;
            }
            i++;
        }
        
        if (current.trim()) {
            values.push(cleanValue(current.trim()));
        }
        
        return values;
    }

    // Limpiar un valor SQL
    function cleanValue(val) {
        if (!val) return '';
        val = val.trim();
        // Remover comillas externas
        if (val.startsWith("'") && val.endsWith("'")) {
            val = val.slice(1, -1);
        }
        // Manejar NULL
        if (val.toUpperCase() === 'NULL') return '';
        return val;
    }

    // Buscar usuario por documento o ID
    function buscarUsuario(usuarios, criterio) {
        if (!usuarios || !Array.isArray(usuarios)) return null;
        
        // Buscar por coincidencia exacta en cualquier campo relevante
        for (const user of usuarios) {
            // Asumiendo estructura típica: [id, usuario, clave, nombres, apellidos, email, documento, ...]
            const id = user[0] || '';
            const nombreUsuario = user[1] || '';
            const nombres = user[3] || '';
            const apellidos = user[4] || '';
            const email = user[5] || '';
            const documento = user[6] || '';
            
            if (documento === criterio || id === criterio || nombreUsuario === criterio) {
                return {
                    id: id,
                    usuario: nombreUsuario,
                    nombres: nombres,
                    apellidos: apellidos,
                    email: email,
                    documento: documento
                };
            }
        }
        return null;
    }

    // Buscar notas del usuario
    function buscarNotas(notas, userId, documento) {
        if (!notas || !Array.isArray(notas)) return [];
        
        const resultados = [];
        for (const nota of notas) {
            // Estructura típica: [id, id_usuario, modulo, nota, fecha, ...]
            const idUsuarioNota = nota[1] || '';
            const modulo = nota[2] || '';
            const calificacion = nota[3] || '';
            const fecha = nota[4] || '';
            
            // Buscar por ID de usuario o por documento
            if (idUsuarioNota == userId || idUsuarioNota == documento) {
                resultados.push({
                    modulo: modulo,
                    nota: calificacion,
                    fecha: fecha
                });
            }
        }
        return resultados;
    }

    // Buscar pagos del usuario
    function buscarPagos(pagos, documento) {
        if (!pagos || !Array.isArray(pagos)) return [];
        
        const resultados = [];
        for (const pago of pagos) {
            // Estructura típica de fac_creditos: adaptar según el dump real
            const fecha = pago[1] || '';
            const cliente = pago[4] || ''; // Campo de cédula/cliente
            const concepto = pago[6] || '';
            const monto = pago[5] || '';
            
            if (cliente == documento) {
                resultados.push({
                    fecha: fecha,
                    concepto: concepto,
                    monto: formatMonto(monto)
                });
            }
        }
        return resultados;
    }

    // Formatear monto
    function formatMonto(monto) {
        if (!monto) return '$0';
        const num = parseFloat(monto);
        if (isNaN(num)) return monto;
        return '$' + num.toLocaleString('es-CO');
    }

    // Renderizar tabla de notas
    function renderNotas(notas) {
        const container = document.getElementById('tableNotas');
        
        if (!notas || notas.length === 0) {
            container.innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No hay calificaciones registradas para este estudiante.</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Módulo / Materia</th><th>Calificación</th><th>Fecha Registro</th></tr></thead><tbody>`;
        
        for (const nota of notas) {
            html += `<tr>
                <td>${escapeHtml(nota.modulo || '---')}</td>
                <td>${escapeHtml(nota.nota || '---')}</td>
                <td>${escapeHtml(nota.fecha || '---')}</td>
            </tr>`;
        }
        
        html += `</tbody>}</div>`;
        container.innerHTML = html;
    }

    // Renderizar tabla de pagos
    function renderPagos(pagos) {
        const container = document.getElementById('tablePagos');
        
        if (!pagos || pagos.length === 0) {
            container.innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No hay registros de pagos para este estudiante.</div>';
            return;
        }
        
        let html = `<tr><thead><tr><th>Fecha</th><th>Concepto</th><th>Valor</th></tr></thead><tbody>`;
        
        for (const pago of pagos) {
            html += `<tr>
                <td>${escapeHtml(pago.fecha || '---')}</td>
                <td>${escapeHtml(pago.concepto || '---')}</td>
                <td>${escapeHtml(pago.monto || '$0')}</td>
            </tr>`;
        }
        
        html += `</tbody>}</div>`;
        container.innerHTML = html;
    }

    // Mostrar mensaje de error
    function mostrarError(mensaje) {
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';
        resultArea.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i> 
                <strong>Error:</strong> ${mensaje}
            </div>
        `;
        
        // Limpiar otras secciones
        document.getElementById('viewName').innerText = '';
        document.getElementById('viewInfo').innerText = '';
        document.getElementById('tableNotas').innerHTML = '';
        document.getElementById('tablePagos').innerHTML = '';
    }

    // Escapar HTML para prevenir XSS
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Cargar al inicio
    window.addEventListener('DOMContentLoaded', () => {
        // Pre-cargar datos en segundo plano
        setTimeout(() => {
            if (!cachedData) {
                fetch(URL_SQL)
                    .then(res => res.text())
                    .then(sql => { cachedData = sql; })
                    .catch(e => console.log('Pre-carga fallida:', e));
            }
        }, 1000);
    });
</script>
</body>
</html>
