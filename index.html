<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d7a6e; --accent: #d4a017; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #eee; padding: 25px; border-radius: 10px; flex-wrap: wrap; }
        input { flex: 1; max-width: 350px; padding: 14px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 14px 28px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #085a52; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result-card { display: none; animation: slideUp 0.5s ease; }
        .profile-header { background: var(--primary); color: white; padding: 25px; border-radius: 10px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .profile-header h2 { margin: 0; word-break: break-word; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background: #f1f1f1; color: var(--primary); font-weight: bold; }
        .loader { display: none; text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
        .loader i { margin-right: 8px; }
        h3 { color: var(--primary); border-left: 5px solid var(--accent); padding-left: 12px; margin-top: 30px; }
        .error-message { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #f5c6cb; }
        .error-message i { margin-right: 8px; }
        .empty-message { background: #e2f0fb; color: #004085; padding: 15px; border-radius: 8px; text-align: center; }
        .success-message { background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            th, td { padding: 8px; font-size: 12px; }
            table { display: block; overflow-x: auto; }
        }
        .debug-info { background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 20px; font-size: 12px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; color: var(--primary);">ASENORTE</h1>
        <p style="margin:5px 0 0 0; color: #666;">Portal de Consulta Académica y Financiera</p>
    </div>

    <div class="search-box">
        <input type="text" id="docInput" placeholder="Número de Cédula o ID" onkeypress="if(event.key==='Enter') consultar()" value="1004375362">
        <button onclick="consultar()" id="searchBtn"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loader" class="loader"><i class="fas fa-sync fa-spin"></i> Procesando Base de Datos SQL...</div>

    <div id="resultArea" class="result-card">
        <div class="profile-header">
            <div style="flex:1">
                <h2 id="viewName" style="margin:0;"></h2>
                <p id="viewInfo" style="margin:5px 0 0 0; opacity: 0.9;"></p>
            </div>
            <i class="fas fa-user-circle fa-3x"></i>
        </div>

        <h3><i class="fas fa-star"></i> Notas y Calificaciones</h3>
        <div id="tableNotas"></div>

        <h3><i class="fas fa-receipt"></i> Historial de Pagos</h3>
        <div id="tablePagos"></div>
        
        <h3><i fa-regular fa-calendar"></i> Matrículas</h3>
        <div id="tableMatriculas"></div>
    </div>
    
    <div id="debugInfo" class="debug-info"></div>
</div>

<script>
    // URL del archivo SQL en Google Drive
    const URL_SQL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';
    
    // Cache de datos
    let databaseData = {
        tbl_estudiantes: [],
        tbl_notas: [],
        fac_creditos: [],
        fac_facturas: [],
        fac_recibos: [],
        tbl_matriculas: [],
        tbl_inscripciones: []
    };
    
    let dataLoaded = false;
    
    async function consultar() {
        const busqueda = document.getElementById('docInput').value.trim();
        if (!busqueda) {
            alert("⚠️ Por favor, ingrese un número de cédula o ID");
            return;
        }
        
        const searchBtn = document.getElementById('searchBtn');
        searchBtn.disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('debugInfo').style.display = 'none';
        
        try {
            // Cargar datos si no están en caché
            if (!dataLoaded) {
                await cargarBaseDatos();
            }
            
            // Buscar estudiante
            const estudiante = buscarEstudiante(busqueda);
            
            if (!estudiante) {
                mostrarError(`No se encontró ningún estudiante con el documento: ${busqueda}`);
                return;
            }
            
            // Mostrar información del estudiante
            mostrarInfoEstudiante(estudiante);
            
            // Buscar y mostrar notas
            const notas = buscarNotas(estudiante.id, estudiante.documento);
            mostrarNotas(notas);
            
            // Buscar y mostrar pagos
            const pagos = buscarPagos(estudiante.documento);
            mostrarPagos(pagos);
            
            // Buscar y mostrar matrículas
            const matriculas = buscarMatriculas(estudiante.id);
            mostrarMatriculas(matriculas);
            
            document.getElementById('resultArea').style.display = 'block';
            
        } catch (error) {
            console.error('Error detallado:', error);
            let mensajeError = "Error al procesar la base de datos. ";
            
            if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                mensajeError += "No se pudo descargar el archivo SQL. Verifique:<br>1) El archivo existe en Google Drive<br>2) El archivo es público (Compartir → 'Cualquier persona con el enlace')<br>3) La URL es correcta<br>4) Su conexión a internet está activa";
            } else if (error.message.includes('SQL')) {
                mensajeError += "Error al parsear el archivo SQL. " + error.message;
            } else {
                mensajeError += error.message;
            }
            
            mostrarError(mensajeError);
            
            // Mostrar debug
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = `<strong>Debug Info:</strong><br>${error.stack || error.message}`;
        } finally {
            document.getElementById('loader').style.display = 'none';
            searchBtn.disabled = false;
        }
    }
    
    async function cargarBaseDatos() {
        return new Promise(async (resolve, reject) => {
            try {
                document.getElementById('loader').innerHTML = '<i class="fas fa-sync fa-spin"></i> Descargando archivo SQL...';
                
                const response = await fetch(URL_SQL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const sqlText = await response.text();
                
                if (!sqlText || sqlText.length < 100) {
                    throw new Error("El archivo SQL está vacío o es demasiado pequeño");
                }
                
                document.getElementById('loader').innerHTML = '<i class="fas fa-sync fa-spin"></i> Parseando tablas SQL...';
                
                // Parsear el SQL
                parseSQLDump(sqlText);
                
                dataLoaded = true;
                document.getElementById('loader').innerHTML = '<i class="fas fa-sync fa-spin"></i> Base de datos cargada. Consultando...';
                
                resolve();
            } catch (error) {
                reject(error);
            }
        });
    }
    
    function parseSQLDump(sqlText) {
        // Resetear datos
        databaseData = {
            tbl_estudiantes: [],
            tbl_notas: [],
            fac_creditos: [],
            fac_facturas: [],
            fac_recibos: [],
            tbl_matriculas: [],
            tbl_inscripciones: []
        };
        
        // Buscar todas las sentencias INSERT
        const insertRegex = /INSERT\s+INTO\s+`?(\w+)`?\s+VALUES\s+((?:\([^;]+\);?))/gi;
        let match;
        let insertCount = 0;
        
        while ((match = insertRegex.exec(sqlText)) !== null) {
            const tableName = match[1].toLowerCase();
            const valuesBlock = match[2];
            
            if (databaseData.hasOwnProperty(tableName)) {
                const rows = parseValuesBlock(valuesBlock);
                databaseData[tableName].push(...rows);
                insertCount++;
            }
        }
        
        console.log(`Parseadas ${insertCount} sentencias INSERT`);
        console.log('Estudiantes:', databaseData.tbl_estudiantes.length);
        console.log('Notas:', databaseData.tbl_notas.length);
        console.log('Creditos:', databaseData.fac_creditos.length);
    }
    
    function parseValuesBlock(valuesBlock) {
        const rows = [];
        let current = '';
        let inString = false;
        let parenthesesLevel = 0;
        
        for (let i = 0; i < valuesBlock.length; i++) {
            const char = valuesBlock[i];
            
            if (char === "'" && (i === 0 || valuesBlock[i-1] !== '\\')) {
                inString = !inString;
                current += char;
            } else if (!inString) {
                if (char === '(') {
                    if (parenthesesLevel === 0) {
                        current = '';
                    }
                    parenthesesLevel++;
                    current += char;
                } else if (char === ')') {
                    parenthesesLevel--;
                    current += char;
                    
                    if (parenthesesLevel === 0 && current.trim()) {
                        // Parsear esta fila
                        const row = parseRow(current);
                        if (row && row.length > 0) {
                            rows.push(row);
                        }
                        current = '';
                    }
                } else if (char === ',' && parenthesesLevel === 0) {
                    // Separador entre filas, ignorar
                    continue;
                } else {
                    current += char;
                }
            } else {
                current += char;
            }
        }
        
        return rows;
    }
    
    function parseRow(rowStr) {
        // Remover paréntesis externos
        let clean = rowStr.trim();
        if (clean.startsWith('(') && clean.endsWith(')')) {
            clean = clean.substring(1, clean.length - 1);
        }
        
        const values = [];
        let current = '';
        let inQuote = false;
        
        for (let i = 0; i < clean.length; i++) {
            const char = clean[i];
            
            if (char === "'" && (i === 0 || clean[i-1] !== '\\')) {
                inQuote = !inQuote;
                current += char;
            } else if (char === ',' && !inQuote) {
                values.push(cleanValue(current.trim()));
                current = '';
            } else {
                current += char;
            }
        }
        
        if (current.trim()) {
            values.push(cleanValue(current.trim()));
        }
        
        return values;
    }
    
    function cleanValue(val) {
        if (!val) return '';
        val = val.trim();
        
        // Remover comillas
        if (val.startsWith("'") && val.endsWith("'")) {
            val = val.substring(1, val.length - 1);
        }
        
        // Manejar NULL
        if (val.toUpperCase() === 'NULL' || val === '') {
            return '';
        }
        
        return val;
    }
    
    function buscarEstudiante(criterio) {
        for (const estudiante of databaseData.tbl_estudiantes) {
            // La estructura puede variar, buscar en varios campos
            const id = estudiante[0] || '';
            const documento = estudiante[1] || estudiante[2] || estudiante[3] || '';
            const nombres = estudiante[2] || estudiante[4] || '';
            const apellidos = estudiante[3] || estudiante[5] || '';
            
            if (documento == criterio || id == criterio) {
                return {
                    id: id,
                    documento: documento,
                    nombres: nombres,
                    apellidos: apellidos,
                    nombreCompleto: `${nombres} ${apellidos}`.trim()
                };
            }
        }
        return null;
    }
    
    function buscarNotas(idEstudiante, documento) {
        const notas = [];
        
        for (const nota of databaseData.tbl_notas) {
            const idEstNota = nota[1] || nota[2] || '';
            const materia = nota[2] || nota[3] || '';
            const calificacion = nota[3] || nota[4] || '';
            const periodo = nota[4] || nota[5] || '';
            
            if (idEstNota == idEstudiante || idEstNota == documento) {
                notas.push({
                    materia: materia,
                    calificacion: calificacion,
                    periodo: periodo
                });
            }
        }
        
        return notas;
    }
    
    function buscarPagos(documento) {
        const pagos = [];
        
        for (const credito of databaseData.fac_creditos) {
            const cliente = credito[4] || credito[5] || credito[3] || '';
            const fecha = credito[1] || credito[2] || '';
            const concepto = credito[6] || credito[7] || '';
            const valor = credito[5] || credito[6] || credito[4] || '';
            
            if (cliente == documento) {
                pagos.push({
                    fecha: fecha,
                    concepto: concepto,
                    valor: formatearMoneda(valor)
                });
            }
        }
        
        // También buscar en fac_facturas
        for (const factura of databaseData.fac_facturas) {
            const cliente = factura[2] || factura[3] || '';
            const fecha = factura[1] || '';
            const total = factura[4] || factura[5] || '';
            
            if (cliente == documento) {
                pagos.push({
                    fecha: fecha,
                    concepto: 'Factura',
                    valor: formatearMoneda(total)
                });
            }
        }
        
        return pagos;
    }
    
    function buscarMatriculas(idEstudiante) {
        const matriculas = [];
        
        for (const matricula of databaseData.tbl_matriculas) {
            const idEst = matricula[1] || matricula[2] || '';
            const grado = matricula[2] || matricula[3] || '';
            const anio = matricula[3] || matricula[4] || '';
            const estado = matricula[4] || matricula[5] || '';
            
            if (idEst == idEstudiante) {
                matriculas.push({
                    grado: grado,
                    anio: anio,
                    estado: estado || 'Activa'
                });
            }
        }
        
        return matriculas;
    }
    
    function mostrarInfoEstudiante(estudiante) {
        document.getElementById('viewName').innerHTML = estudiante.nombreCompleto || 'Estudiante';
        document.getElementById('viewInfo').innerHTML = `Documento: ${estudiante.documento} | ID: ${estudiante.id}`;
    }
    
    function mostrarNotas(notas) {
        const container = document.getElementById('tableNotas');
        
        if (!notas || notas.length === 0) {
            container.innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No hay calificaciones registradas para este estudiante.</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Materia / Asignatura</th><th>Calificación</th><th>Periodo</th></tr></thead><tbody>`;
        
        for (const nota of notas) {
            html += `<tr>
                <td>${escapeHtml(nota.materia || '---')}</td>
                <td><strong>${escapeHtml(nota.calificacion || '---')}</strong></td>
                <td>${escapeHtml(nota.periodo || '---')}</td>
            </tr>`;
        }
        
        html += `</tbody>}%;
        container.innerHTML = html;
    }
    
    function mostrarPagos(pagos) {
        const container = document.getElementById('tablePagos');
        
        if (!pagos || pagos.length === 0) {
            container.innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No hay registros de pagos para este estudiante.</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Fecha</th><th>Concepto</th><th>Valor</th></tr></thead><tbody>`;
        
        for (const pago of pagos) {
            html += `<tr>
                <td>${escapeHtml(pago.fecha || '---')}</td>
                <td>${escapeHtml(pago.concepto || '---')}</td>
                <td>${escapeHtml(pago.valor || '$0')}</td>
            </tr>`;
        }
        
        html += `</tbody>}#
        container.innerHTML = html;
    }
    
    function mostrarMatriculas(matriculas) {
        const container = document.getElementById('tableMatriculas');
        
        if (!matriculas || matriculas.length === 0) {
            container.innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No hay registros de matrícula.</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Grado / Curso</th><th>Año</th><th>Estado</th></tr></thead><tbody>`;
        
        for (const matricula of matriculas) {
            html += `<tr>
                <td>${escapeHtml(matricula.grado || '---')}</td>
                <td>${escapeHtml(matricula.anio || '---')}</td>
                <td>${escapeHtml(matricula.estado || 'Activa')}</td>
            </tr>`;
        }
        
        html += `</tbody>}#
        container.innerHTML = html;
    }
    
    function formatearMoneda(valor) {
        if (!valor || valor === 'NULL') return '$0';
        const numero = parseFloat(valor);
        if (isNaN(numero)) return valor;
        return '$' + numero.toLocaleString('es-CO');
    }
    
    function mostrarError(mensaje) {
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';
        resultArea.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i> 
                <strong>⚠️ Error:</strong><br>
                ${mensaje}
            </div>
            <div class="empty-message" style="margin-top: 15px;">
                <i class="fas fa-lightbulb"></i> <strong>Sugerencias:</strong><br>
                1. Verifique que el archivo SQL sea público en Google Drive<br>
                2. Confirme que la URL del archivo sea correcta<br>
                3. Revise que el archivo no esté corrupto<br>
                4. Intente nuevamente en unos minutos
            </div>
        `;
        
        // Limpiar otras secciones
        document.getElementById('viewName').innerHTML = '';
        document.getElementById('viewInfo').innerHTML = '';
        document.getElementById('tableNotas').innerHTML = '';
        document.getElementById('tablePagos').innerHTML = '';
        document.getElementById('tableMatriculas').innerHTML = '';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Cargar datos al inicio
    window.addEventListener('DOMContentLoaded', () => {
        console.log('Portal ASENORTE cargado');
        // Pre-cargar datos
        setTimeout(() => {
            if (!dataLoaded) {
                cargarBaseDatos().catch(e => console.log('Pre-carga fallida:', e));
            }
        }, 2000);
    });
</script>
</body>
</html>
