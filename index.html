<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASENORTE - Consulta Académica y Financiera</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f4f6f9;
        padding:20px;
        color:#333;
    }

    .container{
        max-width:1400px;
        margin:auto;
    }

    .card{
        background:#fff;
        border-radius:10px;
        padding:20px;
        margin-bottom:20px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    h1{
        margin-bottom:10px;
        color:#1d3557;
    }

    h2{
        margin-bottom:15px;
        color:#1d3557;
    }

    .search-box{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    }

    input{
        flex:1;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        background:#1d3557;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#16324f;
    }

    .status{
        margin-top:15px;
        padding:10px;
        border-radius:8px;
        font-weight:bold;
    }

    .loading{
        background:#fff3cd;
        color:#856404;
    }

    .success{
        background:#d4edda;
        color:#155724;
    }

    .error{
        background:#f8d7da;
        color:#721c24;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:10px;
    }

    table th{
        background:#1d3557;
        color:white;
        padding:10px;
        text-align:left;
    }

    table td{
        border:1px solid #ddd;
        padding:10px;
    }

    table tr:nth-child(even){
        background:#f9f9f9;
    }

    .student-info{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:10px;
    }

    .info-item{
        background:#eef3f8;
        padding:10px;
        border-radius:8px;
    }

    .hidden{
        display:none;
    }

    .loader{
        display:inline-block;
        width:18px;
        height:18px;
        border:3px solid #ccc;
        border-top:3px solid #1d3557;
        border-radius:50%;
        animation:spin 1s linear infinite;
        margin-right:10px;
        vertical-align:middle;
    }

    @keyframes spin{
        100%{
            transform:rotate(360deg);
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>ASENORTE</h1>
        <p>Consulta Académica y Financiera</p>

        <br>

        <div class="search-box">
            <input
                type="text"
                id="documento"
                placeholder="Ingrese número de documento"
            />

            <button onclick="consultar()">
                Consultar
            </button>
        </div>

        <div id="status" class="status hidden"></div>
    </div>

    <div id="resultado" class="hidden">

        <div class="card">
            <h2>Información del Estudiante</h2>

            <div class="student-info" id="studentInfo"></div>
        </div>

        <div class="card">
            <h2>Historial Académico</h2>

            <div style="overflow:auto;">
                <table id="tablaNotas">
                    <thead>
                        <tr>
                            <th>Módulo / Curso</th>
                            <th>Nota</th>
                            <th>Fecha</th>
                            <th>Profesor</th>
                            <th>Grupo</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Historial Financiero</h2>

            <div style="overflow:auto;">
                <table id="tablaPagos">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Concepto</th>
                            <th>Valor</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>

</div>

<script>

const SQL_FILE = './asenorte.sql';

/*
|--------------------------------------------------------------------------
| CACHE GLOBAL
|--------------------------------------------------------------------------
*/

let sqlContent = '';
let tableBlocks = {};

/*
|--------------------------------------------------------------------------
| UTILIDADES
|--------------------------------------------------------------------------
*/

function setStatus(message, type='loading'){

    const status = document.getElementById('status');

    status.className = `status ${type}`;
    status.classList.remove('hidden');

    if(type === 'loading'){
        status.innerHTML = `<span class="loader"></span>${message}`;
    }else{
        status.innerHTML = message;
    }
}

function sanitize(value){

    if(value === null || value === undefined){
        return '';
    }

    return String(value)
        .replace(/\\'/g, "'")
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '\\')
        .replace(/^'/, '')
        .replace(/'$/, '')
        .trim();
}

function money(value){

    const number = parseFloat(value || 0);

    return number.toLocaleString('es-CO',{
        style:'currency',
        currency:'COP'
    });
}

/*
|--------------------------------------------------------------------------
| CARGA SQL
|--------------------------------------------------------------------------
*/

async function loadSQL(){

    if(sqlContent){
        return;
    }

    setStatus('Cargando archivo SQL...');

    const response = await fetch(SQL_FILE);

    if(!response.ok){
        throw new Error('No se pudo cargar asenorte.sql');
    }

    sqlContent = await response.text();

    segmentTables();

    setStatus('Base de datos cargada correctamente','success');
}

/*
|--------------------------------------------------------------------------
| SEGMENTACIÓN POR TABLAS
|--------------------------------------------------------------------------
*/

function segmentTables(){

    /*
    Segmentación optimizada usando delimitadores phpMyAdmin
    */

    const regex =
        /-- Volcar la base de datos para la tabla `([^`]+)`([\s\S]*?)(?=(-- Volcar la base de datos para la tabla|$))/g;

    let match;

    while((match = regex.exec(sqlContent)) !== null){

        const tableName = match[1];
        const block = match[2];

        tableBlocks[tableName] = block;
    }

    console.log('Tablas segmentadas:', Object.keys(tableBlocks));
}

/*
|--------------------------------------------------------------------------
| EXTRACCIÓN INSERTS MULTILÍNEA
|--------------------------------------------------------------------------
*/

function extractTuples(block){

    if(!block){
        return [];
    }

    const inserts = [];

    const insertRegex =
        /INSERT INTO[\s\S]*?VALUES\s*([\s\S]*?);/gi;

    let match;

    while((match = insertRegex.exec(block)) !== null){

        inserts.push(match[1]);
    }

    return inserts;
}

/*
|--------------------------------------------------------------------------
| PARSER DE TUPLAS SQL
|--------------------------------------------------------------------------
*/

function parseRows(insertBlock){

    const rows = [];

    /*
    Soporta:
    (...),(...),(...)
    multilínea
    */

    const tupleRegex = /\(([\s\S]*?)\)(?=,?\s*(\(|$))/g;

    let tupleMatch;

    while((tupleMatch = tupleRegex.exec(insertBlock)) !== null){

        const tuple = tupleMatch[1];

        const fields = splitSQLFields(tuple);

        rows.push(fields);
    }

    return rows;
}

/*
|--------------------------------------------------------------------------
| SPLIT ROBUSTO CAMPOS SQL
|--------------------------------------------------------------------------
*/

function splitSQLFields(row){

    const fields = [];

    let current = '';
    let insideQuote = false;

    for(let i=0;i<row.length;i++){

        const char = row[i];
        const prev = row[i-1];

        if(char === "'" && prev !== "\\"){
            insideQuote = !insideQuote;
        }

        if(char === ',' && !insideQuote){

            fields.push(cleanField(current));
            current = '';

        }else{
            current += char;
        }
    }

    if(current){
        fields.push(cleanField(current));
    }

    return fields;
}

function cleanField(value){

    value = value.trim();

    if(value === 'NULL'){
        return null;
    }

    return sanitize(value);
}

/*
|--------------------------------------------------------------------------
| CONSULTA PRINCIPAL
|--------------------------------------------------------------------------
*/

async function consultar(){

    try{

        const documento =
            document.getElementById('documento').value.trim();

        if(!documento){
            alert('Ingrese un documento');
            return;
        }

        document.getElementById('resultado')
            .classList.add('hidden');

        setStatus('Procesando información académica y financiera...');

        await loadSQL();

        /*
        ------------------------------------------------------------------
        PASO 1
        tbl_usuarios
        ------------------------------------------------------------------
        */

        const usuario =
            buscarUsuario(documento);

        if(!usuario){

            setStatus(
                'No se encontró el estudiante',
                'error'
            );

            return;
        }

        /*
        ------------------------------------------------------------------
        PASO 2
        tbl_resultados
        ------------------------------------------------------------------
        */

        const notas =
            buscarResultados(usuario.id);

        /*
        ------------------------------------------------------------------
        PASO 3
        fac_creditos
        ------------------------------------------------------------------
        */

        const pagos =
            buscarPagos(documento, usuario.id);

        renderUsuario(usuario);
        renderNotas(notas);
        renderPagos(pagos);

        document.getElementById('resultado')
            .classList.remove('hidden');

        setStatus(
            'Consulta completada correctamente',
            'success'
        );

    }catch(error){

        console.error(error);

        setStatus(
            'Error: ' + error.message,
            'error'
        );
    }
}

/*
|--------------------------------------------------------------------------
| BUSCAR USUARIO
|--------------------------------------------------------------------------
*/

function buscarUsuario(documento){

    const block = tableBlocks['tbl_usuarios'];

    if(!block){
        console.warn('No existe tbl_usuarios');
        return null;
    }

    const inserts = extractTuples(block);

    for(const insert of inserts){

        const rows = parseRows(insert);

        for(const row of rows){

            /*
            AJUSTAR SEGÚN ESTRUCTURA REAL
            */

            const id = row[0];
            const doc = row[2] || row[1];
            const nombre =
                `${row[3] || ''} ${row[4] || ''}`.trim();

            if(String(doc) === String(documento)){

                return {
                    id,
                    documento: doc,
                    nombre,
                    raw: row
                };
            }
        }
    }

    return null;
}

/*
|--------------------------------------------------------------------------
| BUSCAR RESULTADOS ACADÉMICOS
|--------------------------------------------------------------------------
*/

function buscarResultados(studentId){

    const block = tableBlocks['tbl_resultados'];

    if(!block){
        console.warn('No existe tbl_resultados');
        return [];
    }

    const inserts = extractTuples(block);

    const resultados = [];

    for(const insert of inserts){

        const rows = parseRows(insert);

        for(const row of rows){

            /*
            AJUSTAR SEGÚN ESTRUCTURA REAL
            */

            const alumnoId = row[1] || row[0];

            if(String(alumnoId) === String(studentId)){

                resultados.push({
                    modulo: row[2] || 'N/A',
                    nota: row[3] || 'N/A',
                    fecha: row[4] || '',
                    profesor: row[5] || 'N/A',
                    grupo: row[6] || 'N/A'
                });
            }
        }
    }

    return resultados;
}

/*
|--------------------------------------------------------------------------
| BUSCAR PAGOS
|--------------------------------------------------------------------------
*/

function buscarPagos(documento, userId){

    const block = tableBlocks['fac_creditos'];

    if(!block){
        console.warn('No existe fac_creditos');
        return [];
    }

    const inserts = extractTuples(block);

    const pagos = [];

    for(const insert of inserts){

        const rows = parseRows(insert);

        for(const row of rows){

            /*
            Estructura detectada:
            CLIENTE_CREDITO = campo 4
            */

            const cliente = row[4];

            /*
            Busca por documento o por ID interno
            */

            if(
                String(cliente) === String(documento) ||
                String(cliente) === String(userId)
            ){

                pagos.push({
                    fecha: row[1],
                    valor: row[5],
                    concepto: row[6]
                });
            }
        }
    }

    return pagos;
}

/*
|--------------------------------------------------------------------------
| RENDER
|--------------------------------------------------------------------------
*/

function renderUsuario(usuario){

    const div = document.getElementById('studentInfo');

    div.innerHTML = `
        <div class="info-item">
            <strong>ID Interno:</strong><br>
            ${usuario.id}
        </div>

        <div class="info-item">
            <strong>Documento:</strong><br>
            ${usuario.documento}
        </div>

        <div class="info-item">
            <strong>Nombre:</strong><br>
            ${usuario.nombre}
        </div>
    `;
}

function renderNotas(notas){

    const tbody =
        document.querySelector('#tablaNotas tbody');

    tbody.innerHTML = '';

    if(!notas.length){

        tbody.innerHTML = `
            <tr>
                <td colspan="5">
                    No se encontraron registros académicos
                </td>
            </tr>
        `;

        return;
    }

    notas.forEach(nota=>{

        tbody.innerHTML += `
            <tr>
                <td>${sanitize(nota.modulo)}</td>
                <td>${sanitize(nota.nota)}</td>
                <td>${sanitize(nota.fecha)}</td>
                <td>${sanitize(nota.profesor)}</td>
                <td>${sanitize(nota.grupo)}</td>
            </tr>
        `;
    });
}

function renderPagos(pagos){

    const tbody =
        document.querySelector('#tablaPagos tbody');

    tbody.innerHTML = '';

    if(!pagos.length){

        tbody.innerHTML = `
            <tr>
                <td colspan="3">
                    No se encontraron registros financieros
                </td>
            </tr>
        `;

        return;
    }

    pagos.forEach(pago=>{

        tbody.innerHTML += `
            <tr>
                <td>${sanitize(pago.fecha)}</td>
                <td>${sanitize(pago.concepto)}</td>
                <td>${money(pago.valor)}</td>
            </tr>
        `;
    });
}

/*
|--------------------------------------------------------------------------
| PRECARGA
|--------------------------------------------------------------------------
*/

window.addEventListener('load', async()=>{

    try{
        await loadSQL();
    }catch(error){

        console.error(error);

        setStatus(
            'Error cargando la base de datos',
            'error'
        );
    }
});

</script>

</body>
</html>
