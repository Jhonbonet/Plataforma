<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil - ASENORTE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d7a6e; --accent: #d4a017; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; background: #eee; padding: 20px; border-radius: 8px; }
        input { flex: 1; max-width: 300px; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #085a52; }
        .result-card { display: none; }
        .user-info { background: var(--primary); color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #f4f4f4; color: var(--primary); }
        .loader { display: none; text-align: center; margin: 20px; color: var(--primary); font-weight: bold; }
        h3 { color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; color: var(--primary);">ASENORTE</h1>
        <p style="margin:5px 0 0 0;">Portal de Consulta Académica y Financiera</p>
    </div>

    <div class="search-box">
        <input type="text" id="inputCedula" placeholder="Número de Documento">
        <button onclick="ejecutarConsulta()"><i class="fas fa-search"></i> CONSULTAR</button>
    </div>

    <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> Conectando con la base de datos...</div>

    <div id="resultArea" class="result-card">
        <div class="user-info">
            <h2 id="userName" style="margin:0;"></h2>
            <p id="userDoc" style="margin:5px 0 0 0; opacity: 0.9;"></p>
        </div>

        <h3><i class="fas fa-graduation-cap"></i> Calificaciones</h3>
        <div id="tablaNotas"></div>

        <h3><i class="fas fa-wallet"></i> Registro de Pagos</h3>
        <div id="tablaPagos"></div>
    </div>
</div>

<script>
    // URL de descarga directa de tu archivo en Drive
    const DB_URL = 'https://docs.google.com/uc?export=download&id=1IyU90zEF2A6_QfG11FQf9Pd1Kqdi0Y0z';

    async function ejecutarConsulta() {
        const cedula = document.getElementById('inputCedula').value.trim();
        if (!cedula) return alert("Ingrese un documento válido");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            const res = await fetch(DB_URL);
            if (!res.ok) throw new Error("Error al descargar el archivo");
            const rawSql = await res.text();

            // 1. Localizar Usuario (tbl_usuarios)
            // Estructura detectada: (ID, login, pass, nombre, apellido, correo, IDENTIFICACION...)
            const userMatch = buscarEnSQL(rawSql, 'tbl_usuarios', cedula);
            if (!userMatch) {
                alert("Estudiante no encontrado.");
                return;
            }

            const uData = limpiarValores(userMatch);
            const idInterno = uData[0]; // El ID que relaciona las notas

            document.getElementById('userName').innerText = `${uData[3]} ${uData[4]}`;
            document.getElementById('userDoc').innerText = `ID: ${uData[6]} | ${uData[5]}`;

            // 2. Localizar Notas (tbl_resultados) usando el idInterno
            const notasLines = buscarLineasMultiples(rawSql, 'tbl_resultados', idInterno);
            const notasData = notasLines.map(line => {
                const n = limpiarValores(line);
                return { ref: 'Módulo ' + n[2], nota: n[3], fecha: n[4] };
            });
            generarTabla('tablaNotas', notasData, ["Módulo", "Nota", "Fecha"], ["ref", "nota", "fecha"]);

            // 3. Localizar Pagos (fac_creditos) usando la Cédula
            const pagosLines = buscarLineasMultiples(rawSql, 'fac_creditos', cedula);
            const pagosData = pagosLines.map(line => {
                const p = limpiarValores(line);
                return { fecha: p[1], concepto: p[6], valor: '$' + p[5] };
            });
            generarTabla('tablaPagos', pagosData, ["Fecha", "Concepto", "Valor"], ["fecha", "concepto", "valor"]);

            document.getElementById('resultArea').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Error: No se pudo procesar la base de datos. Verifique su conexión.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // Funciones de búsqueda precisas para volcados MySQL
    function buscarEnSQL(texto, tabla, criterio) {
        const regex = new RegExp(`INSERT INTO \`${tabla}\` VALUES\\s*\\([^;]*'${criterio}'[^;]*\\);`, 'i');
        const m = texto.match(regex);
        return m ? m[0] : null;
    }

    function buscarLineasMultiples(texto, tabla, criterio) {
        const regex = new RegExp(`INSERT INTO \`${tabla}\` VALUES\\s*\\([^;]*'${criterio}'[^;]*\\);`, 'gi');
        return texto.match(regex) || [];
    }

    function limpiarValores(linea) {
        const content = linea.substring(linea.indexOf('(') + 1, linea.lastIndexOf(')'));
        // Separador inteligente que respeta comas dentro de textos
        return content.split(/,(?=(?:(?:[^']*'){2})*[^']*$)/).map(v => v.trim().replace(/^'|'$/g, ""));
    }

    function generarTabla(id, data, heads, keys) {
        let html = '<table><tr>' + heads.map(h => `<th>${h}</th>`).join('') + '</tr>';
        if (data.length > 0) {
            data.forEach(row => {
                html += '<tr>' + keys.map(k => `<td>${row[k] || '---'}</td>`).join('') + '</tr>';
            });
        } else {
            html += '<tr><td colspan="' + heads.length + '" style="text-align:center;">Sin registros.</td></tr>';
        }
        document.getElementById(id).innerHTML = html + '</table>';
    }
</script>
</body>
</html>
